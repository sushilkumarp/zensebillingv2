// ═══════════════════════════════════════════════════════════════
// ZENSE BILLING v1.0.0  |  Zulekha Healthcare Group
// Storage: window.storage (Claude project-scoped, persists across chats)
// ═══════════════════════════════════════════════════════════════

const VERSION = 'v2.0.0';
const TODAY   = new Date('2026-03-19');
const STORAGE_KEY = 'zense-billing-v7';
// ── Supabase REST helpers (plain fetch, no library needed) ────
const SUPA_URL = 'https://tdporccpzlhkdhrkuftf.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcG9yY2Nwemxoa2Rocmt1ZnRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUxNjE2NTAsImV4cCI6MjA3MDczNzY1MH0.fqYZImTLdXCf1wnVGHM6r6gPEEODsg-z7PvoT4DTmH0';
const SUPA_SCH = 'zense_billing';

// ── Auth state ─────────────────────────────────────────────────────────────
var AUTH = { token: null, user: null, refreshToken: null, expiresAt: 0 };
var AUTH_STORAGE_KEY = 'zense_auth_session';

function _getAuthToken(){
  // Return stored access token if still valid (with 60s buffer)
  if(AUTH.token && Date.now() < AUTH.expiresAt - 60000) return AUTH.token;
  // Try to reload from localStorage (in case another tab refreshed it)
  try {
    var s = localStorage.getItem(AUTH_STORAGE_KEY);
    if(s){ var sess=JSON.parse(s); if(sess.token && Date.now()<sess.expiresAt-60000){ Object.assign(AUTH,sess); return AUTH.token; } }
  } catch(e){}
  return null;
}

function _saveAuthSession(data){
  AUTH.token        = data.access_token;
  AUTH.refreshToken = data.refresh_token;
  AUTH.user         = data.user;
  AUTH.expiresAt    = Date.now() + (data.expires_in||3600)*1000;
  try { localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(AUTH)); } catch(e){}
}

function _clearAuthSession(){
  AUTH = { token:null, user:null, refreshToken:null, expiresAt:0 };
  try { localStorage.removeItem(AUTH_STORAGE_KEY); } catch(e){}
}

async function _refreshAuthToken(){
  if(!AUTH.refreshToken) return false;
  try {
    var r = await fetch(SUPA_URL+'/auth/v1/token?grant_type=refresh_token',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
      body:JSON.stringify({refresh_token:AUTH.refreshToken})
    });
    var d = await r.json();
    if(d.access_token){ _saveAuthSession(d); return true; }
  } catch(e){}
  return false;
}

async function authSignIn(email, password){
  var r = await fetch(SUPA_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
    body:JSON.stringify({email:email, password:password})
  });
  var d = await r.json();
  if(d.access_token){ _saveAuthSession(d); return d; }
  throw new Error(d.error_description || d.msg || d.error || 'Login failed');
}

async function authSignOut(){
  var tok = _getAuthToken();
  if(tok){
    try {
      await fetch(SUPA_URL+'/auth/v1/logout',{
        method:'POST',
        headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+tok}
      });
    } catch(e){}
  }
  _clearAuthSession();
  showLoginScreen();
}

function _sbHeaders(write) {
  // Use authenticated user token when available, else fall back to anon key
  var token = _getAuthToken() || SUPA_KEY;
  var h = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + token,
    'Accept-Profile': SUPA_SCH
  };
  if(write) {
    h['Content-Type']   = 'application/json';
    h['Content-Profile'] = SUPA_SCH;
    h['Prefer']         = 'resolution=merge-duplicates,return=minimal';
  }
  return h;
}

async function _sbGet(table, query) {
  var url = SUPA_URL + '/rest/v1/' + table + (query ? '?' + query : '');
  var r = await fetch(url, { headers: _sbHeaders(false) });
  if(!r.ok) throw new Error(table + ' GET ' + r.status + ': ' + await r.text());
  return r.json();
}

async function _sbUpsert(table, rows, conflictCol) {
  if(!rows || !rows.length) return;
  var url = SUPA_URL + '/rest/v1/' + table + '?on_conflict=' + (conflictCol||'id');
  var r = await fetch(url, {
    method: 'POST', headers: _sbHeaders(true),
    body: JSON.stringify(Array.isArray(rows) ? rows : [rows])
  });
  if(!r.ok) { var t=await r.text();  throw new Error(t); }
}

async function _sbDelete(table, id) {
  var url = SUPA_URL + '/rest/v1/' + table + '?id=eq.' + encodeURIComponent(id);
  var r = await fetch(url, { method: 'DELETE', headers: _sbHeaders(true) });
  // errors silently ignored — localStorage is source of truth
}


function dbToInv(r){return{id:r.id,invoiceNo:r.invoice_no,project:r.project,lineItem:r.line_item||'',lineItemRef:r.line_item_ref||'',vendor:r.vendor||'',type:r.type||'CAPEX',invoiceAmt:parseFloat(r.invoice_amt)||0,invoiceDate:r.invoice_date||'',dueDate:r.due_date||'',paymentTerms:r.payment_terms||'',status:r.status||'',currency:r.currency||'AED',description:r.description||'',canBePaid:r.can_be_paid||false,payments:(r.zb_payments||[]).map(function(p){return{id:p.id,amount:parseFloat(p.amount)||0,date:p.date||'',ref:p.ref||'',note:p.note||''};})};}
function invToDb(i){return{id:i.id,invoice_no:i.invoiceNo,project:i.project,line_item:i.lineItem||'',line_item_ref:i.lineItemRef||'',vendor:i.vendor||'',type:i.type||'CAPEX',invoice_amt:i.invoiceAmt||0,invoice_date:i.invoiceDate||null,due_date:i.dueDate||null,payment_terms:i.paymentTerms||'',status:i.status||'',currency:i.currency||'AED',description:i.description||'',can_be_paid:i.canBePaid||false};}
function dbToBud(r){return{ref:r.ref,project:r.project,name:r.name,type:r.type,vendor:r.vendor||'',freq:r.freq||'one-time',total:parseFloat(r.total)||0,liTotalCost:parseFloat(r.li_total_cost)||0,desc:r.desc_text||'',payMonth:r.pay_month||'',paySchedule:r.pay_schedule||'',recurStart:r.recur_start||'',recurEnd:r.recur_end||'',projStatus:r.proj_status||'',projStart:r.proj_start||'',projEnd:r.proj_end||'',projDuration:r.proj_duration||'',projDesc:r.proj_desc||'',projCost:parseFloat(r.proj_cost)||0};}

async function sbSync(inv,delId,pmts,delPmtId){
  var f=document.getElementById('saved-flash');
  // In iframe/preview mode — all writes are local only, no Supabase
  var isIframe = (typeof window!=='undefined' && window.self !== window.top);
  var isNetlify = (typeof window!=='undefined' && window.location && window.location.hostname.indexOf('netlify') >= 0);
  if(isIframe && !isNetlify){
    if(f){f.style.display='inline';f.style.color='#D97706';f.textContent='✓ Sandbox only';clearTimeout(f._t);f._t=setTimeout(function(){f.style.display='none';},2000);}
    return; // don't attempt Supabase writes from iframe
  }
  try{
    if(delId)    await _sbDelete('invoices',delId);
    if(inv)      await _sbUpsert('invoices',[invToDb(inv)],'id');
    if(pmts&&pmts.length) await _sbUpsert('payments',pmts,'id');
    if(delPmtId) await _sbDelete('payments',delPmtId);
    if(f){f.style.display='inline';f.textContent='✓ Saved ☁';f.style.color='#059669';clearTimeout(f._t);f._t=setTimeout(function(){f.style.display='none';},2000);}
  }catch(e){
    if(f){f.style.display='inline';f.textContent='✓ Local only';f.style.color='#D97706';clearTimeout(f._t);f._t=setTimeout(function(){f.style.display='none';},2000);}
  }
}

const genRef = () => 'LI-' + Math.random().toString(36).substr(2,6).toUpperCase();
const fmt    = n => { if(!n) return 'AED 0'; const a=Math.abs(n); if(a>=1e6) return 'AED '+(n/1e6).toFixed(1)+'M'; if(a>=1000) return 'AED '+Math.round(n/1000)+'K'; return 'AED '+Math.round(n).toLocaleString(); };
const fmtN   = n => (n||0).toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
const totalPaid   = inv => (inv.payments||[]).reduce((a,p)=>a+(p.amount||0),0);
const outstanding = inv => Math.max(0,(inv.invoiceAmt||0)-totalPaid(inv));
function deriveStatus(inv) {
  var ia = +(inv.invoiceAmt)||0;
  var tp = totalPaid(inv);
  var out = ia - tp;
  // Fully paid — regardless of whether due date passed
  if(ia > 0 && tp >= ia) return 'Paid';
  // Partially paid
  if(tp > 0 && tp < ia) {
    // Partial AND overdue
    if(inv.dueDate && new Date(inv.dueDate) < TODAY) return 'Overdue';
    return 'Partial';
  }
  // Nothing paid
  if(inv.dueDate && new Date(inv.dueDate) < TODAY) return 'Overdue';
  return 'Pending';
}

// Derived helpers for display
function pmtDate(inv){ var p=(inv.payments||[]); return p.length ? p[p.length-1].date : ''; }
function pmtRef(inv) { var p=(inv.payments||[]); return p.length ? p[p.length-1].ref  : ''; }
function canBePaid(inv){ return inv.canBePaid === true; }

function cfMatch(val,q){
  if(!q) return true;
  var qlo=q.toLowerCase();
  // Boolean canBePaid: map true→"yes", false→"no"
  if(typeof val==="boolean") val=val?"yes":"no";
  return String(val||"").toLowerCase().indexOf(qlo)>=0;
}
function cfSet(view,field,val){
  CF[view][field]=val;
  // The filter input has id="cf-{view}-{field}" — save cursor, re-render, restore focus
  var inputId='cf-'+view+'-'+field;
  var el=document.getElementById(inputId);
  var cursor=el?el.selectionStart:0;
  render();
  var restored=document.getElementById(inputId);
  if(restored){
    restored.focus();
    try{restored.setSelectionRange(cursor,cursor);}catch(e){}
  }
}
function cfSort(view,field){var cf=CF[view];if(cf.sortCol===field)cf.sortDir*=-1;else{cf.sortCol=field;cf.sortDir=1;}render();}
function cfClear(view){var cf=CF[view];Object.keys(cf).forEach(function(k){if(k!=="sortCol"&&k!=="sortDir")cf[k]="";});render();}
function cfApply(arr,cf,fields){
  var r=arr.filter(function(row){return fields.every(function(f){return cfMatch(row[f],cf[f]);});});
  if(cf.sortCol){r=r.slice().sort(function(a,b){var av=a[cf.sortCol]||"",bv=b[cf.sortCol]||"";return av<bv?-cf.sortDir:av>bv?cf.sortDir:0;});}
  return r;
}
function cfHdr(view,field,label){

  h+='style="width:100%;padding:2px 5px;border:1px solid #d1d5db;border-radius:3px;font-size:10px" ';

// ── Persist to window.storage (delta-only — minimal payload) ────
// Only stores CHANGES vs seed data — keeps payload tiny (<50KB)
function buildDelta(){
  // Build CBP seed map for accurate canBePaid comparison
  var cbpSeed=CBP_SEED||{};
  // Build seed invoice map
  var seedMap={};
  SEED_INVOICES.forEach(function(s){seedMap[s.id]=s;});

  var added=[], modified=[], deleted=[];

  STATE.invoices.forEach(function(inv){
    var seed=seedMap[inv.id];
    if(!seed){
      // New invoice - store minimal fields only
      added.push({
        id:inv.id, invoiceNo:inv.invoiceNo, project:inv.project,
        lineItem:inv.lineItem, lineItemRef:inv.lineItemRef, vendor:inv.vendor,
        type:inv.type, invoiceAmt:inv.invoiceAmt, invoiceDate:inv.invoiceDate,
        dueDate:inv.dueDate, paymentTerms:inv.paymentTerms,
        currency:inv.currency||'AED', description:inv.description||'',
        canBePaid:inv.canBePaid||false,
        payments:(inv.payments||[]).map(function(p){
          return {id:p.id||'',amount:p.amount,date:p.date,ref:p.ref||'',note:p.note||''};
        })
      });
      return;
    }

    var diff={id:inv.id};

    // Payments: compare amount+date+ref only (ignore id/note noise)
    var seedPmtSig=JSON.stringify((seed.payments||[]).map(function(p){return{a:p.amount,d:p.date,r:p.ref||''};}));
    var invPmtSig =JSON.stringify((inv.payments||[]).map(function(p){return{a:p.amount,d:p.date,r:p.ref||''};}));
    if(invPmtSig!==seedPmtSig){
      diff.payments=(inv.payments||[]).map(function(p){
        return {id:p.id||'',amount:p.amount,date:p.date,ref:p.ref||'',note:p.note||''};
      });
    }

    // canBePaid: compare against CBP_SEED (the authoritative default), not seed invoice
    var seedCBP = cbpSeed.hasOwnProperty(inv.invoiceNo) ? cbpSeed[inv.invoiceNo] : false;
    if(inv.canBePaid !== seedCBP) diff.canBePaid = inv.canBePaid;

    // User-editable fields
    var editFields=['invoiceNo','vendor','project','lineItem','lineItemRef','invoiceAmt','invoiceDate','dueDate','paymentTerms','currency','description','type'];
    editFields.forEach(function(k){ if(inv[k]!==seed[k]) diff[k]=inv[k]; });

    if(Object.keys(diff).length>1) modified.push(diff);
  });

  // Deleted
  var stateIds={};
  STATE.invoices.forEach(function(i){stateIds[i.id]=true;});
  SEED_INVOICES.forEach(function(s){if(!stateIds[s.id])deleted.push(s.id);});

  return {added:added, modified:modified, deleted:deleted};
}

// ── Dashboard ─────────────────────────────────────────────────
var _anlChartData=null;
function renderAnalytics(){
  var inv=STATE.invoices, todayStr=TODAY.toISOString().slice(0,10), todayMo=todayStr.slice(0,7);

  // ── Build ALL months from earliest invoice to 12 months ahead ─────────
  var allKeys=new Set();
  inv.forEach(function(i){
    if(i.invoiceDate) allKeys.add(i.invoiceDate.slice(0,7));
    (i.payments||[]).forEach(function(p){ if(p.date) allKeys.add(p.date.slice(0,7)); });
    if(i.dueDate) allKeys.add(i.dueDate.slice(0,7));
  });
  for(var fi=0;fi<=12;fi++){var fd=new Date(TODAY.getFullYear(),TODAY.getMonth()+fi,1);allKeys.add(fd.getFullYear()+'-'+String(fd.getMonth()+1).padStart(2,'0'));}
  var sortedKeys=[...allKeys].sort();
  if(!sortedKeys.length) sortedKeys=[todayMo];

  // ── Filter state ────────────────────────────────────────────────────────
  if(!window._anlFilter) window._anlFilter='all';
  if(!window._anlCompare) window._anlCompare=false;
  if(!window._anlPeriodA) window._anlPeriodA='';
  if(!window._anlPeriodB) window._anlPeriodB='';
  var F=window._anlFilter, cmp=window._anlCompare;

  // Apply period filter to get visible month range
  function applyFilter(keys, filter){
    var curYear=TODAY.getFullYear(), lastYear=curYear-1;
    if(filter==='all') return keys;
    if(filter==='thisyear') return keys.filter(function(k){return k.slice(0,4)==String(curYear);});
    if(filter==='lastyear') return keys.filter(function(k){return k.slice(0,4)==String(lastYear);});
    if(filter==='6m'){
      var cutoff=new Date(TODAY.getFullYear(),TODAY.getMonth()-5,1);
      var ck=cutoff.getFullYear()+'-'+String(cutoff.getMonth()+1).padStart(2,'0');
      return keys.filter(function(k){return k>=ck&&k<=todayMo;});
    }
    if(filter==='12m'){
      var cutoff12=new Date(TODAY.getFullYear(),TODAY.getMonth()-11,1);
      var ck12=cutoff12.getFullYear()+'-'+String(cutoff12.getMonth()+1).padStart(2,'0');
      return keys.filter(function(k){return k>=ck12&&k<=todayMo;});
    }
    if(filter==='custom'){
      var a=window._anlPeriodA, b=window._anlPeriodB;
      if(a&&b) return keys.filter(function(k){return k>=a&&k<=b;});
      if(a) return keys.filter(function(k){return k>=a;});
    }
    return keys;
  }

  var visKeys=applyFilter(sortedKeys,F);
  // Ensure current month always present
  if(visKeys.indexOf(todayMo)<0) visKeys.push(todayMo);
  visKeys.sort();

  // ── Build month data for a set of keys ─────────────────────────────────
  function buildMonthData(keys){
    var map={};
    keys.forEach(function(k){map[k]={key:k,invoiced:0,paid:0,dueAmt:0,count:0,dueCount:0};});
    inv.forEach(function(i){
      var invMo=(i.invoiceDate||'').slice(0,7);
      var dueMo=(i.dueDate||'').slice(0,7);
      var out=outstanding(i);
      if(map[invMo]){map[invMo].invoiced+=(i.invoiceAmt||0);map[invMo].count++;}
      if(map[dueMo]&&out>0){map[dueMo].dueAmt+=out;map[dueMo].dueCount++;}
      (i.payments||[]).forEach(function(p){
        var pm=(p.date||'').slice(0,7);
        if(pm&&map[pm]) map[pm].paid+=(p.amount||0);
      });
    });
    return keys.map(function(k){return map[k];});
  }

  var visMonths=buildMonthData(visKeys);
  var allMonths=buildMonthData(sortedKeys); // for detail tables (always all)

  // ── Compare period B ────────────────────────────────────────────────────
  var cmpMonths=[];
  if(cmp){
    var curYear2=TODAY.getFullYear();
    var prevKeys=applyFilter(sortedKeys, F==='thisyear'?'lastyear': F==='lastyear'?'custom': '12m');
    if(F==='all') prevKeys=sortedKeys.filter(function(k){return k<visKeys[0];});
    cmpMonths=buildMonthData(prevKeys.slice(-visKeys.length));
  }

  // ── Chart data ─────────────────────────────────────────────────────────
  var labels=visMonths.map(function(m){
    var p=m.key.split('-');
    return new Date(parseInt(p[0]),parseInt(p[1])-1,1).toLocaleString('default',{month:'short'})+" '"+(p[0]).slice(2);
  });
  var invoicedArr=visMonths.map(function(m){return Math.round(m.invoiced);});
  var paidArr    =visMonths.map(function(m){return Math.round(m.paid);});
  var dueArr     =visMonths.map(function(m){return Math.round(m.dueAmt);});
  var cmpInvoiced=cmpMonths.map(function(m){return Math.round(m.invoiced);});
  var cmpPaid    =cmpMonths.map(function(m){return Math.round(m.paid);});
  var curIdx=visKeys.indexOf(todayMo);

  _anlChartData={
    labels:labels,invoiced:invoicedArr,paid:paidArr,due:dueArr,curIdx:curIdx,
    cmpInvoiced:cmpInvoiced,cmpPaid:cmpPaid,compare:cmp,
    duePast:dueArr.map(function(v,i){return i<curIdx?v:0;}),
    dueCur: dueArr.map(function(v,i){return i===curIdx?v:0;}),
    dueFut: dueArr.map(function(v,i){return i>curIdx?v:0;})
  };

  // ── KPIs (scoped to visible period) ────────────────────────────────────
  var visInv=inv.filter(function(i){
    if(F==='all') return true;
    var mo=(i.invoiceDate||'').slice(0,7);
    return visKeys.indexOf(mo)>=0;
  });
  var totInv=visMonths.reduce(function(a,m){return a+m.invoiced;},0);
  var totPaid=visMonths.reduce(function(a,m){return a+m.paid;},0);
  var totOut=F==='all'?inv.reduce(function(a,b){return a+outstanding(b);},0):visInv.reduce(function(a,b){return a+outstanding(b);},0);
  var totOD=F==='all'?inv.filter(function(i){var s=deriveStatus(i);return s==='Overdue'||s==='Partial';}).reduce(function(a,b){return a+outstanding(b);},0):0;
  var curMoData=allMonths.find(function(m){return m.key===todayMo;})||{dueAmt:0,dueCount:0};
  var nxtKey=sortedKeys[Math.min(sortedKeys.indexOf(todayMo)+1,sortedKeys.length-1)];
  var nxtMoData=allMonths.find(function(m){return m.key===nxtKey;})||{dueAmt:0,dueCount:0};

  // ── Filter bar HTML ────────────────────────────────────────────────────
  var filterOpts=[
    ['all','All Time'],['thisyear','This Year ('+TODAY.getFullYear()+')'],
    ['lastyear','Last Year ('+(TODAY.getFullYear()-1)+')'],
    ['6m','Last 6 Months'],['12m','Last 12 Months'],['custom','Custom Range']
  ];
  var filterBar='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid #f3f4f6;background:#FAFAFA">'
    +'<span style="font-size:11px;font-weight:600;color:#374151;margin-right:4px">Period:</span>';
  filterOpts.forEach(function(fo){
    filterBar+='<button class="f-btn'+(F===fo[0]?' active':'')+'" onclick="window._anlFilter=\''+fo[0]+'\';renderAnalyticsView()" style="font-size:11px">'+fo[1]+'</button>';
  });
  filterBar+='<div style="margin-left:auto;display:flex;align-items:center;gap:8px">';
  filterBar+='<label style="display:flex;align-items:center;gap:5px;font-size:11px;color:#374151;cursor:pointer">'
    +'<input type="checkbox" '+(cmp?'checked':'')+' onchange="window._anlCompare=this.checked;renderAnalyticsView()" style="width:auto">'
    +'Compare to prior period</label>';
  filterBar+='</div></div>';

  // Custom range inputs
  var customPanel=F==='custom'?
    '<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:#EFF6FF;border-bottom:1px solid #BFDBFE">'
    +'<span style="font-size:11px;color:#1E40AF;font-weight:600">Custom Range:</span>'
    +'<input type="month" value="'+(window._anlPeriodA||'')+'" onchange="window._anlPeriodA=this.value;renderAnalyticsView()" style="padding:3px 8px;border:1px solid #93C5FD;border-radius:5px;font-size:11px;width:160px">'
    +'<span style="color:#6b7280">→</span>'
    +'<input type="month" value="'+(window._anlPeriodB||'')+'" onchange="window._anlPeriodB=this.value;renderAnalyticsView()" style="padding:3px 8px;border:1px solid #93C5FD;border-radius:5px;font-size:11px;width:160px">'
    +'<span style="font-size:11px;color:#6b7280">'+visKeys.length+' months selected</span>'
    +'</div>' : '';

  // ── Render ───────────────────────────────────────────────────────────────
  var h='<div class="page">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<div><div class="page-title">Analytics — Outflow by Period</div>'
    +'<div style="font-size:11px;color:#6b7280">Charts & tables: <strong>'+filterOpts.find(function(f){return f[0]===F;})[1]+'</strong>'+(cmp?' · Comparing to prior period':'')+'</div></div>'
    +'<div style="font-size:11px;color:#6b7280;font-weight:600">'+inv.length+' invoices · '+TODAY.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+'</div></div>';

  // KPIs
  h+='<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px">';
  [
    ['Total Invoiced','#1B2A4A',fmtN(Math.round(totInv)),F==='all'?'All time':'Selected period','invoiced'],
    ['Total Paid','#059669',fmtN(Math.round(totPaid)),'Settled','paid'],
    ['Outstanding','#DC2626',fmtN(Math.round(totOut)),'Unpaid balance','outstanding'],
    ['Overdue Now','#B91C1C',fmtN(Math.round(totOD)),'Needs payment','overdue'],

function anlRegClear(){
  window._anlReg={q:'',project:'',vendor:'',status:'',type:'',invFrom:'',invTo:'',dueFrom:'',dueTo:'',pmtFrom:'',pmtTo:'',sort:'dueDate',sortDir:1};
  renderAnalyticsView();
}
function anlRegSort(th){
  var col=th.getAttribute('data-col');
  if(!window._anlReg) window._anlReg={sort:'dueDate',sortDir:1};
  if(window._anlReg.sort===col){ window._anlReg.sortDir=-window._anlReg.sortDir; }
  else { window._anlReg.sort=col; window._anlReg.sortDir=1; }
  renderAnalyticsView();
}
function renderAnalyticsView(){
  if(VIEW!=='analytics') return;
  var app=document.getElementById('app');
  app.innerHTML=renderAnalytics();
  setTimeout(renderAnalyticsCharts,50);
}

function renderAnalyticsCharts(){
  if(VIEW!=='analytics'||!_anlChartData) return;
  var d=_anlChartData;
  if(!window._anlCI) window._anlCI={};
  ['anl-chart1','anl-chart2'].forEach(function(id){if(window._anlCI[id]){window._anlCI[id].destroy();delete window._anlCI[id];}});
  var fmtAx=function(v){return v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'K':v;};
  var baseOpts={responsive:true,maintainAspectRatio:true,
    plugins:{legend:{labels:{font:{size:10},boxWidth:12}},
      tooltip:{callbacks:{label:function(c){return c.dataset.label+': AED '+c.parsed.y.toLocaleString('en',{maximumFractionDigits:0});}}}},
    scales:{x:{ticks:{font:{size:9},maxRotation:60,minRotation:30,autoSkip:true,maxTicksLimit:24}},
            y:{ticks:{font:{size:9},callback:fmtAx}}}};

  var ds1=[
    {label:'Invoiced',data:d.invoiced,backgroundColor:'rgba(27,42,74,0.7)',borderRadius:2},
    {label:'Paid',   data:d.paid,    backgroundColor:'rgba(5,150,105,0.75)',borderRadius:2}
  ];
  if(d.compare&&d.cmpInvoiced&&d.cmpInvoiced.length){
    ds1.push({label:'Invoiced (prior)',data:d.cmpInvoiced,backgroundColor:'rgba(27,42,74,0.25)',borderRadius:2,borderDash:[4,4]});
    ds1.push({label:'Paid (prior)',    data:d.cmpPaid,    backgroundColor:'rgba(5,150,105,0.25)',borderRadius:2});
  }
  var c1=document.getElementById('anl-chart1');
  if(c1) window._anlCI['anl-chart1']=new Chart(c1,{type:'bar',data:{labels:d.labels,datasets:ds1},options:baseOpts});

  var c2=document.getElementById('anl-chart2');
  if(c2) window._anlCI['anl-chart2']=new Chart(c2,{type:'bar',data:{labels:d.labels,datasets:[
    {label:'Past Due',      data:d.duePast,backgroundColor:'rgba(220,38,38,0.75)',borderRadius:2},
    {label:'Due This Month',data:d.dueCur, backgroundColor:'rgba(217,119,6,0.8)',borderRadius:2},
    {label:'Upcoming Due',  data:d.dueFut, backgroundColor:'rgba(124,58,237,0.65)',borderRadius:2}
  ]},options:baseOpts});
}


function renderDashboard() {
  var inv=STATE.invoices, bud=STATE.budget;
  var tb=bud.reduce(function(a,b){return a+fullTermTotal(b);},0);
  var ti=inv.reduce(function(a,b){return a+(b.invoiceAmt||0);},0);
  var tp=inv.reduce(function(a,b){return a+totalPaid(b);},0);
  var partial=inv.filter(function(i){return deriveStatus(i)==='Partial';}).reduce(function(a,b){return a+outstanding(b);},0);
  var ov=inv.filter(function(i){return deriveStatus(i)==='Overdue'||deriveStatus(i)==='Partial';}).reduce(function(a,b){return a+outstanding(b);},0);
  var va=tb-ti, pct=tb>0?ti/tb:0;
  var projs = STATE.projects.length
    ? STATE.projects.map(function(p){return p.name;})
    : [...new Set(bud.map(function(b){return b.project;}))];
  var pRows=projs.map(function(proj){
    var bl=bud.filter(function(b){return b.project===proj;});
    var pi=inv.filter(function(i){return i.project===proj;});
    var b=bl.reduce(function(a,x){return a+fullTermTotal(x);},0);
    var a=pi.reduce(function(a,x){return a+(x.invoiceAmt||0);},0);
    var p=pi.reduce(function(a,x){return a+totalPaid(x);},0);
    var o=pi.reduce(function(a,x){return a+outstanding(x);},0);

function editInvLIRefresh(){
  var proj=document.getElementById('ei-proj').value;
  var liSel=document.getElementById('ei-li');if(!liSel)return;
  liSel.innerHTML='';
  STATE.budget.filter(function(b){return b.project===proj;}).forEach(function(b){
    liSel.innerHTML+='<option value="'+b.ref+'|'+b.name+'">'+b.ref+' | '+b.name+'</option>';
  });
}
function editInvDueCalc(){
  var d=document.getElementById('ei-invdate').value;
  var pt=document.getElementById('ei-terms').value;
  var dd=calcDue(d,pt);
  if(dd){var el=document.getElementById('ei-duedate');if(el){el.value=dd;el.style.background='#F0FDF4';}}
}
function saveEditInv(invId){
  var liRaw=(document.getElementById('ei-li').value||'').split('|');
  var updates={
    invoiceNo:   document.getElementById('ei-invno').value.trim(),
    vendor:      document.getElementById('ei-vendor').value.trim(),
    project:     document.getElementById('ei-proj').value,
    lineItemRef: liRaw[0]||document.getElementById('ei-liref').value.trim(),
    lineItem:    liRaw[1]||'',
    invoiceAmt:  +document.getElementById('ei-amt').value,
    invoiceDate: document.getElementById('ei-invdate').value,
    paymentTerms:document.getElementById('ei-terms').value,
    dueDate:     document.getElementById('ei-duedate').value,
    description: document.getElementById('ei-desc').value.trim(),
    currency:    document.getElementById('ei-ccy').value,
    canBePaid:   document.getElementById('ei-cbp') ? document.getElementById('ei-cbp').checked : false,
  };
  if(!updates.invoiceNo||!updates.project||!updates.invoiceAmt){
    var e=document.getElementById('ei-err');e.textContent='Invoice #, Project and Amount are required.';e.style.display='block';return;
  }
  STATE.invoices=STATE.invoices.map(function(i){return i.id===invId?Object.assign({},i,updates):i;});
  persist();
  sbSync(STATE.invoices.find(function(i){return i.id===invId;}),null,null,null);
  closeModal();render();
}
function deleteInvoice(invId){
  STATE.invoices=STATE.invoices.filter(function(i){return i.id!==invId;});
  persist();sbSync(null,invId,null,null);closeModal();render();
}

function savePaymentEdits(invId){
  var inv=STATE.invoices.find(function(i){return i.id===invId;});
  if(!inv)return;
  var pmts=(inv.payments||[]).map(function(pp,pi){
    var amt=parseFloat((document.getElementById('epm-amt-'+pi)||{}).value)||pp.amount;
    var dt=((document.getElementById('epm-date-'+pi)||{}).value)||pp.date;
    var rf=((document.getElementById('epm-ref-'+pi)||{}).value)||pp.ref;
    return Object.assign({},pp,{amount:amt,date:dt,ref:rf});
  });
  STATE.invoices=STATE.invoices.map(function(i){return i.id===invId?Object.assign({},i,{payments:pmts}):i;});
  persist();
  // Sync updated invoice + all payment rows to Supabase
  var updatedInv=STATE.invoices.find(function(i){return i.id===invId;});
  var dbPmts=pmts.map(function(p){return{id:p.id||genId(),invoice_id:invId,amount:p.amount,date:p.date||null,ref:p.ref||'',note:p.note||''};});
  sbSync(updatedInv,null,dbPmts,null);
  render();
  var flash=document.getElementById('ei-err');
  if(flash){flash.style.color='#059669';flash.textContent='✓ Payment records saved.';flash.style.display='block';setTimeout(function(){flash.style.display='none';flash.style.color='#DC2626';},2500);}
}

function deletePaymentLine(btn,invId,pmtIdx){
  var inv=STATE.invoices.find(function(i){return i.id===invId;});
  if(!inv)return;
  var idx=parseInt(pmtIdx,10);
  var deletedPmt=(inv.payments||[])[idx];
  var newPmts=(inv.payments||[]).filter(function(_,i){return i!==idx;});
  STATE.invoices=STATE.invoices.map(function(i){return i.id===invId?Object.assign({},i,{payments:newPmts}):i;});
  persist();
  // Delete from Supabase if payment has an id, then re-sync invoice
  var updatedInv=STATE.invoices.find(function(i){return i.id===invId;});
  if(deletedPmt&&deletedPmt.id) sbSync(updatedInv,null,null,deletedPmt.id);
  else sbSync(updatedInv,null,null,null);
  render();
  openEditPaymentsModal(invId);
}

function savePaymentEditsModal(invId){
  var inv=STATE.invoices.find(function(i){return i.id===invId;});
  if(!inv)return;
  var pmts=(inv.payments||[]).map(function(pp,pi){
    var amt=parseFloat((document.getElementById('epm-amt-'+pi)||{}).value);
    var dt=((document.getElementById('epm-date-'+pi)||{}).value);
    var rf=((document.getElementById('epm-ref-'+pi)||{}).value);
    return Object.assign({},pp,{
      amount: isNaN(amt)?pp.amount:amt,
      date:   dt||pp.date,
      ref:    rf!==undefined?rf:pp.ref
    });
  });
  STATE.invoices=STATE.invoices.map(function(i){return i.id===invId?Object.assign({},i,{payments:pmts}):i;});
  persist();
  // Sync to Supabase
  var updatedInv=STATE.invoices.find(function(i){return i.id===invId;});
  var dbPmts=pmts.map(function(p){return{id:p.id||genId(),invoice_id:invId,amount:p.amount,date:p.date||null,ref:p.ref||'',note:p.note||''};});
  sbSync(updatedInv,null,dbPmts,null);
  render(); // refresh background table immediately
  var msg=document.getElementById('epm-msg');
  if(msg){msg.style.display='block';msg.style.background='#F0FDF4';msg.style.color='#065F46';msg.style.border='1px solid #A7F3D0';msg.textContent='✓ Payment records saved successfully.';}
  setTimeout(function(){closeModal();},1200);
}
function openEditBudModal(ref){

    : STATE.budget.find(function(b){return b.ref===ref;});
  if(!bl)return;

  // For recurring lines, reverse-calculate per-period amount from stored total
  var perPeriodAmt = bl.total;
  if(!isNew && bl.freq && bl.freq !== 'one-time' && bl.recurStart && bl.recurEnd && bl.recurStart <= bl.recurEnd){
    var _s = new Date(bl.recurStart+'-01'), _e = new Date(bl.recurEnd+'-01');
    var _months = (_e.getFullYear()-_s.getFullYear())*12 + (_e.getMonth()-_s.getMonth()) + 1;
    var _periods = bl.freq==='monthly' ? _months : bl.freq==='quarterly' ? Math.ceil(_months/3) : Math.ceil(_months/12);
    if(_periods > 0) perPeriodAmt = Math.round((bl.total / _periods) * 100) / 100;
  }

  var projOpts=STATE.projects.map(function(p){
    return '<option value="'+p.name+'"'+(bl.project===p.name?' selected':'')+'>'+p.name+'</option>';

function ebRecalc(){
  var amtEl = document.getElementById('eb-amount');
  var freqEl = document.getElementById('eb-freq');
  var startEl= document.getElementById('eb-start');
  var endEl  = document.getElementById('eb-end');
  var lblEl  = document.getElementById('eb-calc-label');
  var totEl  = document.getElementById('eb-calc-total');
  if(!amtEl||!freqEl||!lblEl||!totEl) return;

  var amt   = parseFloat(amtEl.value)||0;
  var freq  = freqEl.value;
  var total = 0;
  var labelTxt = '';

  if(freq==='one-time'){
    total = amt;
    labelTxt = 'One-time payment';
  } else {
    var start = startEl ? startEl.value : '';
    var end   = endEl   ? endEl.value   : '';
    if(start && end && start <= end){
      var s = new Date(start+'-01');
      var e = new Date(end+'-01');
      var months = (e.getFullYear()-s.getFullYear())*12 + (e.getMonth()-s.getMonth()) + 1;
      var periods = freq==='monthly' ? months : freq==='quarterly' ? Math.ceil(months/3) : Math.ceil(months/12);
      total = amt * periods;
      labelTxt = freq.charAt(0).toUpperCase()+freq.slice(1)+' payment of AED '+amt.toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2})+' × '+periods+' periods';
    } else {
      total = amt;
      labelTxt = freq.charAt(0).toUpperCase()+freq.slice(1)+' payment of AED '+amt.toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
    }
  }
  lblEl.textContent = labelTxt;
  totEl.textContent = 'Total: AED '+total.toLocaleString('en-AE',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function saveEditBud(origRef,isNew){
  var freq  = document.getElementById('eb-freq').value;
  var amt   = parseFloat(document.getElementById('eb-amount').value)||0;
  // Recalculate total from freq/start/end
  var total = amt;
  if(freq!=='one-time'){
    var s = (document.getElementById('eb-start')||{}).value||'';
    var e = (document.getElementById('eb-end')||{}).value||'';
    if(s && e && s<=e){
      var sd=new Date(s+'-01'), ed=new Date(e+'-01');
      var months=(ed.getFullYear()-sd.getFullYear())*12+(ed.getMonth()-sd.getMonth())+1;
      var periods=freq==='monthly'?months:freq==='quarterly'?Math.ceil(months/3):Math.ceil(months/12);
      total=amt*periods;
    }
  }
  var updates={
    ref:       document.getElementById('eb-ref').value.trim().toUpperCase(),
    project:   document.getElementById('eb-proj').value,
    name:      document.getElementById('eb-name').value.trim(),
    vendor:    (document.getElementById('eb-vendor').value==='__new__'
                 ? (document.getElementById('eb-vendor-new').value||'').trim()
                 : document.getElementById('eb-vendor').value),
    type:      document.getElementById('eb-type').value,
    freq:      freq,
    total:     total,
    liTotalCost: total,  // always authoritative — prevents fullTermTotal from re-multiplying
    desc:      document.getElementById('eb-desc').value.trim(),
    payMonth:  freq==='one-time'?((document.getElementById('eb-month')||{}).value||''):'',
    recurStart:freq!=='one-time'?((document.getElementById('eb-start')||{}).value||''):'',
    recurEnd:  freq!=='one-time'?((document.getElementById('eb-end')||{}).value||''):'',
  };
  if(!updates.ref||!updates.name||!amt){
    var e=document.getElementById('eb-err');e.textContent='Name, LI Code and Amount are required.';e.style.display='block';return;
  }
  if(isNew){
    if(STATE.budget.find(function(b){return b.ref===updates.ref;})){
      var e2=document.getElementById('eb-err');e2.textContent='LI Code already exists — please use a different code.';e2.style.display='block';return;
    }
    var newLine=Object.assign({liTotalCost:total,paySchedule:'',projStatus:'',projStart:'',projEnd:'',projDuration:'',projDesc:'',projCost:0},updates);
    STATE.budget=STATE.budget.concat([newLine]);
    _sbUpsert('budget_lines',[budToDb(newLine)],'ref').catch(function(){});
  } else {
    STATE.budget=STATE.budget.map(function(b){return b.ref===origRef?Object.assign({},b,updates):b;});
    var updatedBud=STATE.budget.find(function(b){return b.ref===updates.ref;});
    if(updatedBud) _sbUpsert('budget_lines',[budToDb(updatedBud)],'ref').catch(function(){});
  }
  persist();
  closeModal();render();
}

function deleteBudgetLine(ref){
  var line = STATE.budget.find(function(b){return b.ref===ref;});
  if(!line) return;
  // Check if any invoices reference this line
  var linked = STATE.invoices.filter(function(i){return i.lineItemRef===ref;});
  var msg = 'Delete budget line "'+line.name+'" ('+ref+')?';
  if(linked.length){
    msg += '\n\n⚠ WARNING: '+linked.length+' invoice(s) reference this line item. They will lose their LI Code link but won\'t be deleted.';
  }
  if(!confirm(msg)) return;
  STATE.budget = STATE.budget.filter(function(b){return b.ref!==ref;});
  persist();
  // Delete from Supabase
  var canUseSupa = window.location && window.location.protocol !== 'file:';
  if(canUseSupa){
    var url = SUPA_URL + '/rest/v1/budget_lines?ref=eq.' + encodeURIComponent(ref);
    fetch(url, { method: 'DELETE', headers: _sbHeaders(true) }).catch(function(){});
  }
  closeModal(); render();
}

function toggleCanBePaid(invId){
  STATE.invoices = STATE.invoices.map(function(i){
    return i.id === invId ? Object.assign({}, i, {canBePaid: !i.canBePaid}) : i;
  });
  persist();

function previewPay(invId){
  var inv=STATE.invoices.find(function(i){return i.id===invId;});
  if(!inv) return;
  var p=totalPaid(inv), ia=inv.invoiceAmt||0;
  var amt=parseFloat(document.getElementById('pay-amt').value)||0;
  var pct=ia>0?p/ia:0, addPct=ia>0?amt/ia:0;
  var bar=document.getElementById('pay-prev-bar'), lbl=document.getElementById('pay-pct-lbl');
  if(bar){bar.style.width=Math.min(addPct*100,100-pct*100)+'%'; bar.style.left=Math.min(pct*100,100)+'%';}
  if(lbl) lbl.textContent='After this payment: '+Math.min(Math.round((p+amt)/ia*100),100)+'% settled';
}

function savePayment(invId){
  var inv=STATE.invoices.find(function(i){return i.id===invId;});
  var amt=parseFloat(document.getElementById('pay-amt').value)||0;
  var date=document.getElementById('pay-date').value;
  var ref=document.getElementById('pay-ref').value.trim();
  var note=document.getElementById('pay-note').value.trim();
  var errEl=document.getElementById('pay-amt-err');
  var o=outstanding(inv);
  if(amt<=0||isNaN(amt)){errEl.textContent='Enter a valid amount';return;}
  if(amt>o+0.01){errEl.textContent='Cannot exceed outstanding AED '+fmtN(o);return;}
  if(!date){alert('Enter payment date');return;}
  if(!ref){alert('Enter bank/transfer reference');return;}
  var payment={id:genId(),amount:amt,date:date,ref:ref,note:note};
  var newPmts=(inv.payments||[]).concat([payment]);
  var tp2=newPmts.reduce(function(a,p){return a+(p.amount||0);},0);
  var newStatus=tp2>=(inv.invoiceAmt||0)?'Paid':tp2>0?'Partial':new Date(inv.dueDate)<TODAY?'Overdue':'Pending';
  STATE.invoices=STATE.invoices.map(function(i){return i.id===invId?Object.assign({},i,{payments:newPmts,status:newStatus}):i;});
  var lp=payment;
  persist();
  sbSync(STATE.invoices.find(function(i){return i.id===invId;}),null,[{id:lp.id,invoice_id:invId,amount:lp.amount,date:lp.date||null,ref:lp.ref||'',note:lp.note||''}],null);
  closeModal(); render();
}

function validateStaging(){
  var existing=new Set(STATE.invoices.map(function(i){return i.invoiceNo;}));
  STATE.staging=STATE.staging.map(function(row){
    var e={};
    if(!row.invoiceNo)e.invoiceNo='Required'; else if(existing.has(row.invoiceNo))e.invoiceNo='Duplicate';
    if(!row.project)e.project='Required'; if(!row.lineItem)e.lineItem='Required';
    if(!row.vendor)e.vendor='Required'; if(!row.type)e.type='Required';
    if(!row.invoiceAmt||isNaN(+row.invoiceAmt))e.invoiceAmt='Invalid';
    if(!row.invoiceDate)e.invoiceDate='Required'; if(!row.dueDate)e.dueDate='Required';
    var pa=+row.paymentAmt||0;
    if(pa<0)e.paymentAmt='Cannot be negative';
    if(pa>(+row.invoiceAmt||0)+0.01)e.paymentAmt='Exceeds invoice';
    return Object.assign({},row,{_errors:e,_valid:!Object.keys(e).length,_checked:true});
  });
  render();
}

function postStaging(){
  var valid=STATE.staging.filter(function(r){return r._valid;});
  if(!valid.length) return;
  var newInvs=valid.map(function(r){
    var ia=+r.invoiceAmt, pa=Math.min(+r.paymentAmt||0,ia);
    var payments=pa>0?[{id:genId(),amount:pa,date:r.paymentDate||r.invoiceDate,ref:r.paymentRef||'On receipt',note:''}]:[];
    var status=pa>=ia&&ia>0?'Paid':pa>0?'Partial':new Date(r.dueDate)<TODAY?'Overdue':'Pending';
    return {id:genId(),invoiceNo:r.invoiceNo,project:r.project,lineItem:r.lineItem,lineItemRef:r.lineItemRef,
      vendor:r.vendor,type:r.type,invoiceAmt:ia,invoiceDate:r.invoiceDate,dueDate:r.dueDate,
      paymentTerms:r.paymentTerms||'',
      payments:payments,status:status,currency:r.currency||'AED',description:r.description||''};
  });
  STATE.invoices=STATE.invoices.concat(newInvs);
  STATE.staging=STATE.staging.filter(function(r){return !r._valid;});
  persist();
  newInvs.forEach(function(inv){
    var pmts=inv.payments.map(function(p){return{id:p.id,invoice_id:inv.id,amount:p.amount,date:p.date||null,ref:p.ref||'',note:p.note||''};});
    sbSync(inv,null,pmts,null);
  });
  updateStageBadge(); navigate('invoices');
}

// ── Budget ────────────────────────────────────────────────────
function fullTermTotal(b){
  // liTotalCost from Excel is always authoritative when present
  if(b.liTotalCost && b.liTotalCost > 0) return b.liTotalCost;
  if(b.type==='CAPEX') return b.total;  // CAPEX one-time fallback
  // Fallback: calculate from recurStart/recurEnd
  if(!b.recurStart || !b.recurEnd) return b.total;
  var fm={monthly:1,quarterly:3,annually:12};
  var pm=fm[b.freq]||12;
  var s=b.recurStart.split('-'); var e=b.recurEnd.split('-');
  var startM=parseInt(s[0])*12+parseInt(s[1]);
  var endM  =parseInt(e[0])*12+parseInt(e[1]);
  var months=endM-startM+1;
  var periods=Math.max(1,Math.round(months/pm));
  return Math.round(b.total*periods*100)/100;
}

function epAddNewVendor(){
  var inp = document.getElementById('ep-vendor-new');
  var name = (inp.value||'').trim();
  if(!name) return;
  var sel = document.getElementById('ep-vendors');
  for(var i=0;i<sel.options.length;i++){
    if(sel.options[i].value.toLowerCase()===name.toLowerCase()){
      sel.options[i].selected=true; inp.value=''; return;
    }
  }
  var opt = document.createElement('option');
  opt.value=name; opt.textContent=name; opt.selected=true;
  sel.appendChild(opt); inp.value='';
}

function saveEditProject(originalName){
  var newName = (document.getElementById('ep-name').value||'').trim();
  var sel     = document.getElementById('ep-vendors');
  var vendors = Array.from(sel.selectedOptions).map(function(o){return o.value;}).join(', ');
  var status  = document.getElementById('ep-status').value;
  var start   = document.getElementById('ep-start').value;
  var end     = document.getElementById('ep-end').value;

  var errEl = document.getElementById('ep-err');
  if(!newName){ errEl.textContent='Project name is required.'; errEl.style.display='block'; return; }
  if(!vendors){ errEl.textContent='Please select at least one vendor.'; errEl.style.display='block'; return; }
  // Check name collision (ignore self)
  if(newName!==originalName && STATE.projects.find(function(p){return p.name.toLowerCase()===newName.toLowerCase();})){
    errEl.textContent='A project with this name already exists.'; errEl.style.display='block'; return;
  }
  errEl.style.display='none';

  STATE.projects = STATE.projects.map(function(p){
    if(p.name!==originalName) return p;
    return Object.assign({},p,{name:newName, vendors:vendors, status:status, startDate:start, endDate:end});
  });
  // Also update budget lines and invoices if name changed
  if(newName !== originalName){
    STATE.budget   = STATE.budget.map(function(b){  return b.project===originalName ? Object.assign({},b,{project:newName}) : b; });
    STATE.invoices = STATE.invoices.map(function(i){ return i.project===originalName ? Object.assign({},i,{project:newName}) : i; });
  }

  persist();
  var proj = STATE.projects.find(function(p){return p.name===newName;});
  if(proj) _sbUpsert('projects',[projToDb(proj)],'id').catch(function(){});

  projectDrill = newName;
  closeModal(); render();
}

function saveProject(){
  var name=document.getElementById('pj-name').value.trim();
  var sel=document.getElementById('pj-vendors');
  var selectedVendors=Array.from(sel.selectedOptions).map(function(o){return o.value;});
  var vendors=selectedVendors.join(', ');
  var status=document.getElementById('pj-status').value;
  var startDate=document.getElementById('pj-start').value;
  var ok=true;
  if(!name){document.getElementById('pj-name-e').textContent='Required';ok=false;}
  else if(STATE.projects.find(function(p){return p.name.toLowerCase()===name.toLowerCase();})){document.getElementById('pj-name-e').textContent='Already exists';ok=false;}
  else document.getElementById('pj-name-e').textContent='';
  if(!vendors){document.getElementById('pj-vendors-e').textContent='Please select at least one vendor';ok=false;}else document.getElementById('pj-vendors-e').textContent='';
  if(!ok) return;
  var newProj = {id:genId(),name:name,vendors:vendors,status:status,startDate:startDate};
  STATE.projects.push(newProj);
  persist();
  _sbUpsert('projects',[projToDb(newProj)],'id').catch(function(){});
  closeModal(); render();
}

    h+='<td style="background:#F5F3FF">'+(pli2?'<span class="badge '+(pli2.type==='CAPEX'?'b-capex':'b-opex')+'" style="font-size:9px">'+pli2.type+'</span><div style="font-size:9px;color:#6b7280;margin-top:1px">'+pli2.freq+'</div>':'&mdash;')+'</td>';
    h+='<td class="r" style="font-size:11px">'+p.qty+'</td>';
    h+='<td class="r" style="font-size:11px">$'+p.unitPrice.toFixed(2)+'</td>';
    h+='<td class="r" style="font-size:11px;color:#059669;font-weight:600">'+(p.netFee>0?'$'+p.netFee.toLocaleString():'—')+'</td>';
    h+='<td><span class="badge" style="background:#F3F4F6;color:#374151;font-size:9px">'+p.freq+'</span></td>';
    h+='</tr>';
  });

  h+='</tbody></table></div></div>';
  h+='</div>';
  return h;
}

function saveEditVendor(originalName){
  var newName = (document.getElementById('ev-name').value||'').trim();
  var errEl   = document.getElementById('ev-name-e');
  if(!newName){ errEl.textContent='Vendor name is required.'; return; }
  if(newName === originalName){ closeModal(); return; }
  errEl.textContent='';

  // Update budget lines
  STATE.budget = STATE.budget.map(function(b){
    return b.vendor===originalName ? Object.assign({},b,{vendor:newName}) : b;
  });

  // Update invoices
  STATE.invoices = STATE.invoices.map(function(i){
    return i.vendor===originalName ? Object.assign({},i,{vendor:newName}) : i;
  });

  // Update project vendor lists
  STATE.projects = STATE.projects.map(function(p){
    var vendors = (p.vendors||'').split(',').map(function(v){return v.trim();});
    var idx = vendors.indexOf(originalName);
    if(idx<0) return p;
    vendors[idx] = newName;
    return Object.assign({},p,{vendors:vendors.join(', ')});
  });

  persist();

  // Sync to Supabase — budget lines + invoices + projects
  var canUseSupa = window.location && window.location.protocol !== 'file:';
  if(canUseSupa){
    var updatedBudget = STATE.budget.filter(function(b){return b.vendor===newName;});
    var updatedInv    = STATE.invoices.filter(function(i){return i.vendor===newName;});
    var updatedProj   = STATE.projects.filter(function(p){
      return (p.vendors||'').split(',').map(function(v){return v.trim();}).indexOf(newName)>=0;
    });
    if(updatedBudget.length) _sbUpsert('budget_lines', updatedBudget.map(budToDb), 'ref').catch(function(){});
    if(updatedInv.length)    updatedInv.forEach(function(i){ sbSync(i,null,null,null); });
    if(updatedProj.length)   _sbUpsert('projects', updatedProj.map(projToDb), 'id').catch(function(){});
  }

  vendorDrill = newName;
  closeModal(); render();
}

function saveAddVendor(){
  var projName = document.getElementById('av-proj').value;
  var vendorName = (document.getElementById('av-name').value||'').trim();
  var errEl = document.getElementById('av-err');
  if(!projName){ errEl.textContent='Please select a project.'; errEl.style.display='block'; return; }
  if(!vendorName){ errEl.textContent='Please enter a vendor name.'; errEl.style.display='block'; return; }
  errEl.style.display='none';

  // Update the project's vendors string
  var proj = STATE.projects.find(function(p){return p.name===projName;});
  if(!proj){ errEl.textContent='Project not found.'; errEl.style.display='block'; return; }

  var current = (proj.vendors||'').split(',').map(function(v){return v.trim();}).filter(Boolean);
  if(current.indexOf(vendorName)>=0){
    errEl.textContent=vendorName+' is already linked to this project.';
    errEl.style.display='block'; return;
  }
  current.push(vendorName);
  proj.vendors = current.join(', ');

  persist();
  _sbUpsert('projects',[projToDb(proj)],'id').catch(function(){});
  closeModal(); render();
}

function renderVendors(){
  // ── Aggregate data by vendor ──────────────────────────────────────────
  var inv = STATE.invoices, bud = STATE.budget;

  // Build vendor map from budget
  var vendorMap = {};
  bud.forEach(function(b){
    var v = b.vendor;
    if(!vendorMap[v]) vendorMap[v]={
      vendor:v, projects:[], budgetLines:[],
      totalBudget:0, totalInvoiced:0, totalPaid:0, totalOutstanding:0, totalOverdue:0,
      capex:0, opex:0, invoices:[]
    };
    vendorMap[v].totalBudget += fullTermTotal(b);
    if(b.type==='CAPEX') vendorMap[v].capex += fullTermTotal(b);
    else vendorMap[v].opex += fullTermTotal(b);
    vendorMap[v].budgetLines.push(b);
    if(vendorMap[v].projects.indexOf(b.project)<0) vendorMap[v].projects.push(b.project);
  });

  // Also include vendors defined in project vendor lists (even if no budget lines yet)
  STATE.projects.forEach(function(p){
    (p.vendors||'').split(',').forEach(function(v){
      v = v.trim(); if(!v) return;
      if(!vendorMap[v]) vendorMap[v]={
        vendor:v, projects:[], budgetLines:[],
        totalBudget:0, totalInvoiced:0, totalPaid:0, totalOutstanding:0, totalOverdue:0,
        capex:0, opex:0, invoices:[]
      };
      if(vendorMap[v].projects.indexOf(p.name)<0) vendorMap[v].projects.push(p.name);
    });
  });

  // Aggregate invoices to vendors
  inv.forEach(function(i){
    var v = i.vendor;
    if(!vendorMap[v]) vendorMap[v]={
      vendor:v, projects:[], budgetLines:[],
      totalBudget:0, totalInvoiced:0, totalPaid:0, totalOutstanding:0, totalOverdue:0,
      capex:0, opex:0, invoices:[]
    };
    vendorMap[v].totalInvoiced += +i.invoiceAmt||0;
    vendorMap[v].totalPaid     += totalPaid(i);
    vendorMap[v].totalOutstanding += outstanding(i);
    var _s=deriveStatus(i); if(_s==='Overdue'||_s==='Partial') vendorMap[v].totalOverdue += outstanding(i);
    vendorMap[v].invoices.push(i);
    if(vendorMap[v].projects.indexOf(i.project)<0) vendorMap[v].projects.push(i.project);
  });

  var vendors = Object.values(vendorMap).sort(function(a,b){ return b.totalBudget-a.totalBudget; });

  // ── Drill-down view ────────────────────────────────────────────────────
  if(vendorDrill){
    var vd = vendorMap[vendorDrill];
    if(!vd){ vendorDrill=null; return renderVendors(); }

    var variance = vd.totalInvoiced - vd.totalBudget;
    var varPct   = vd.totalBudget>0 ? Math.round(variance/vd.totalBudget*100) : 0;
    var utilPct  = vd.totalBudget>0 ? Math.round(vd.totalInvoiced/vd.totalBudget*100) : 0;

    // Budget lines table

      var bInv = inv.filter(function(i){ return i.lineItemRef===b.ref||i.lineItem===b.name&&i.project===b.project; });
      var bInvoiced = bInv.reduce(function(a,i){ return a+(+i.invoiceAmt||0); },0);
      var bPaid     = bInv.reduce(function(a,i){ return a+totalPaid(i); },0);
      var bOut      = bInv.reduce(function(a,i){ return a+outstanding(i); },0);

  }).join('');

  return '<div class="page">'

    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +'<div class="card" style="padding:14px 16px;border-top:3px solid #1B2A4A"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Total Budget</div><div style="font-size:22px;font-weight:700;color:#1B2A4A">AED '+fmtN(totalBudgetAll)+'</div></div>'
    +'<div class="card" style="padding:14px 16px;border-top:3px solid #2563EB"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Total Invoiced</div><div style="font-size:22px;font-weight:700;color:#2563EB">AED '+fmtN(totalInvAll)+'</div></div>'
    +'<div class="card" style="padding:14px 16px;border-top:3px solid #059669"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Total Paid</div><div style="font-size:22px;font-weight:700;color:#059669">AED '+fmtN(totalPaidAll)+'</div></div>'
    +'<div class="card" style="padding:14px 16px;border-top:3px solid #7C3AED"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Outstanding</div><div style="font-size:22px;font-weight:700;color:#7C3AED">AED '+fmtN(totalOutAll)+'</div></div>'
    +'</div>'
    // Vendor table
    +'<div class="card"><div style="overflow-x:auto"><table>'
    +'<thead><tr>'
    +'<th style="min-width:160px"><div style="padding:8px 10px">Vendor</div></th>'

    +'<td class="r">'+fmtN(totalBudgetAll)+'</td>'
    +'<td class="r">'+fmtN(vendors.reduce(function(a,v){return a+v.capex;},0))+'</td>'

    +'<style>.hover-row:hover{background:#F8FAFF!important;transition:background .15s}</style>'

}

// ── Cash Flow Excel Export ─────────────────────────────────────
async function downloadCashFlowExcel(monthKey){
  var mk = monthKey;
  var months = cfMonths();
  var mLabel = months.find(function(m){return m.key===mk;})||{label:mk};
  var budget   = +(STATE.cfBudget[mk]||0);
  var actual   = cfActualForMonth(mk);
  var overdue  = cfOverdueBeforeMonth(mk);
  var forecast = cfForecastForMonth(mk);
  var totalNeeded = forecast + overdue;
  var sim = cfSuggestPayments(mk, budget);

  var now = new Date();
  var ts  = now.toLocaleDateString('en-AE',{day:'2-digit',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('en-AE',{hour:'2-digit',minute:'2-digit',hour12:true});
  var fname = 'CashFlow_'+mLabel.label.replace(' ','_')+'_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'.xlsx';

  var wb = new ExcelJS.Workbook();
  wb.creator = 'Zense Billing '+VERSION;
  wb.created = now;

  var C = {
    navy:'FF1B2A4A', teal:'FF00897B', green:'FF059669', red:'FFDC2626',
    amber:'FFD97706', gold:'FFF9A825', white:'FFFFFFFF',
    bgLight:'FFF5F6FA', bgGreen:'FFD1FAE5', bgRed:'FFFEE2E2',
    bgAmber:'FFFEF3C7', bgYellow:'FFFFFBEB',
    border:'FFE5E7EB', textGray:'FF6B7280', textDark:'FF374151',
  };
  var AED2='#,##0.00', AED0='#,##0';

  function hdr(ws,row,cols,bgCol,fgCol){
    var r=ws.getRow(row); r.height=22;
    cols.forEach(function(v,i){
      var cell=r.getCell(i+1);
      cell.value=v;
      cell.font={bold:true,color:{argb:fgCol||C.white},size:10,name:'Calibri'};
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:bgCol||C.navy}};
      cell.alignment={vertical:'middle',horizontal:typeof v==='number'?'right':'left'};
      cell.border={top:{style:'thin',color:{argb:C.border}},bottom:{style:'thin',color:{argb:C.border}},left:{style:'thin',color:{argb:C.border}},right:{style:'thin',color:{argb:C.border}}};
    });
  }
  function dataRow(ws,row,vals,fmts,bgCol,boldCols){
    var r=ws.getRow(row); r.height=18;
    vals.forEach(function(v,i){
      var cell=r.getCell(i+1); cell.value=v;
      var isBold = boldCols&&boldCols.indexOf(i)>=0;
      cell.font={size:10,name:'Calibri',color:{argb:C.textDark},bold:!!isBold};
      if(fmts&&fmts[i]) cell.numFmt=fmts[i];
      cell.alignment={vertical:'middle',horizontal:typeof v==='number'?'right':'left'};
      if(bgCol) cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:bgCol}};
      cell.border={top:{style:'hair',color:{argb:C.border}},bottom:{style:'hair',color:{argb:C.border}},left:{style:'hair',color:{argb:C.border}},right:{style:'hair',color:{argb:C.border}}};
    });
  }
  function titleRow(ws,row,text,bg,fg,sz){
    var cell=ws.getRow(row).getCell(1); cell.value=text;
    cell.font={bold:true,size:sz||12,color:{argb:fg||C.white},name:'Calibri'};
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:bg||C.navy}};
    cell.alignment={vertical:'middle'}; ws.getRow(row).height=28;
  }
  function sectionHdr(ws,row,text,cols,bg){
    var r=ws.getRow(row); r.height=20;
    ws.mergeCells(row,1,row,cols);
    var cell=r.getCell(1); cell.value=text;
    cell.font={bold:true,size:11,color:{argb:C.white},name:'Calibri'};
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:bg||C.navy}};
    cell.alignment={vertical:'middle'};
  }
  function spacer(ws,row,h){ ws.getRow(row).height=h||5; }
  function N(n){ return Math.round((n||0)*100)/100; }

  // ── SHEET 1: Payment Run Summary ────────────────────────────────
  var ws1 = wb.addWorksheet('Payment Run Summary',{views:[{state:'frozen',ySplit:4}]});
  ws1.columns=[{width:36},{width:22},{width:22},{width:22},{width:22},{width:18},{width:16},{width:20},{width:24}];

  titleRow(ws1,1,'ZULEKHA HEALTHCARE GROUP — DIGITAL TRANSFORMATION PROGRAMME',C.navy,C.gold,13);
  ws1.mergeCells('A1:I1');
  titleRow(ws1,2,mLabel.label+' Cash Flow  |  Payment Run Planning  |  Generated: '+ts,C.teal,C.white,10);
  ws1.mergeCells('A2:I2');
  titleRow(ws1,3,'CONFIDENTIAL — FOR FINANCE USE ONLY',C.red,'FFFFFFFF',10);
  ws1.mergeCells('A3:I3');
  spacer(ws1,4);

  // KPI summary block
  sectionHdr(ws1,5,'CASH FLOW SUMMARY',4,C.navy);
  hdr(ws1,6,['Metric','Amount (AED)','Notes',''],C.navy,C.white);
  var kpis=[
    ['Monthly Cash Budget',   budget,  budget>0?'Available for this payment run':'Not set — please configure'],
    ['Total Needed',          totalNeeded, 'Overdue + Due this month'],
    ['Overdue (Brought Fwd)', overdue, 'From prior months — urgent'],
    ['Due This Month',        forecast,'New invoices due in '+mLabel.label],
    ['Actual Paid (MTD)',     actual,  'Payments already made this month'],
    ['Simulation: Suggested', sim.selected.reduce(function(a,c){return a+outstanding(c.inv);},0), sim.selected.length+' invoice(s) selected by auto-simulation'],
    ['Simulation: Deferred',  sim.skipped.reduce(function(a,c){return a+outstanding(c.inv);},0),  sim.skipped.length+' invoice(s) deferred — budget insufficient'],
    ['Budget Remaining',      budget>0?budget-sim.selected.reduce(function(a,c){return a+outstanding(c.inv);},0):0, 'After suggested payment run'],
  ];
  kpis.forEach(function(k,i){
    var r=ws1.getRow(7+i); r.height=20;
    var bg = i%2===0?'FFFBFCFD':C.white;
    var amtColor = k[0].indexOf('Deferred')>=0?C.red:k[0].indexOf('Remaining')>=0?C.green:k[0].indexOf('Overdue')>=0?C.red:C.navy;
    r.getCell(1).value=k[0]; r.getCell(1).font={size:10,bold:true,color:{argb:C.textGray},name:'Calibri'};
    r.getCell(2).value=N(k[1]); r.getCell(2).font={size:12,bold:true,color:{argb:amtColor},name:'Calibri'}; r.getCell(2).numFmt=AED2; r.getCell(2).alignment={horizontal:'right'};
    r.getCell(3).value=k[2]; r.getCell(3).font={size:9,color:{argb:C.textGray},name:'Calibri'};
    [1,2,3].forEach(function(ci){if(bg)r.getCell(ci).fill={type:'pattern',pattern:'solid',fgColor:{argb:bg}};});
  });
  spacer(ws1,15);

  // Manual selections (if any)
  var manIds = Object.keys(cfManualSel);
  if(manIds.length>0){
    var manTotal=0;
    manIds.forEach(function(id){var inv=STATE.invoices.find(function(i){return i.id===id;});if(inv){var a=cfManualSel[id]||0;manTotal+=a>0?Math.min(a,outstanding(inv)):outstanding(inv);}});
    sectionHdr(ws1,16,'MANUAL SELECTION — CONFIRMED PAY RUN',4,'FF5B21B6');
    hdr(ws1,17,['Metric','Amount (AED)','Notes',''],C.navy,C.white);
    dataRow(ws1,18,['Invoices Selected',manIds.length,'Manually chosen for payment run'],null,'FFEDE9FE');
    dataRow(ws1,19,[' Total Outflow',N(manTotal),'Sum of selected payments (incl. partials'],null,'FFEDE9FE');
    ws1.getRow(19).getCell(2).numFmt=AED2;
    spacer(ws1,20);
  }

  // ── SHEET 2: Invoice Detail ──────────────────────────────────────
  var ws2 = wb.addWorksheet('Invoice Detail',{views:[{state:'frozen',ySplit:2}]});
  ws2.columns=[{width:6},{width:26},{width:20},{width:34},{width:14},{width:14},{width:14},{width:16},{width:20},{width:20},{width:16},{width:16},{width:22}];

  titleRow(ws2,1,mLabel.label+' Cash Flow — Invoice Detail  |  '+ts,C.navy,C.gold);
  ws2.mergeCells('A1:M1');
  hdr(ws2,2,['#','Invoice #','Vendor','Project / Line Item','Type','Status','Due Date','Days OD','Outstanding (AED)','Pay Amount (AED)','Simulation','Can Pay','Notes'],C.navy,C.white);

  // Build full invoice list: overdue first, then due this month
  var overdueInvs = STATE.invoices.filter(function(inv){
    return outstanding(inv)>0 && inv.dueDate && inv.dueDate < mk+'-01';
  }).sort(function(a,b){return (a.dueDate||'').localeCompare(b.dueDate||'');});

  var dueInvs = STATE.invoices.filter(function(inv){
    return inv.dueDate && inv.dueDate.startsWith(mk) && outstanding(inv)>0;
  });

  var allRows = overdueInvs.concat(dueInvs);
  var r2 = 3;

  // Section: Overdue
  if(overdueInvs.length){
    sectionHdr(ws2,r2,'OVERDUE — FROM PRIOR MONTHS ('+overdueInvs.length+' invoices)',13,C.red);
    r2++;
    overdueInvs.forEach(function(inv,i){
      var out = outstanding(inv);
      var daysOD = inv.dueDate ? Math.floor((TODAY-new Date(inv.dueDate))/86400000) : 0;
      var isSimSel = sim.selected.some(function(c){return c.inv.id===inv.id;});
      var manAmt = cfManualSel[inv.id]!==undefined ? (cfManualSel[inv.id]||out) : null;
      var payAmt = manAmt!==null ? Math.min(manAmt,out) : (isSimSel?out:0);
      var bg = isSimSel?C.bgGreen:daysOD>60?'FFFEE2E2':'FFFFF5F5';
      dataRow(ws2,r2,[i+1,inv.invoiceNo,inv.vendor,(inv.lineItem||'')+(inv.lineItemRef?' ['+inv.lineItemRef+']':''),inv.type||'',deriveStatus(inv),inv.dueDate,daysOD>0?daysOD:0,N(out),payAmt!==null?N(payAmt):0,isSimSel?'✓ In Run':'Deferred',inv.canBePaid?'Yes':'No',inv.description||''],
        [null,null,null,null,null,null,null,'#,##0',AED2,AED2],bg,[8,9]);
      ws2.getRow(r2).getCell(8).font={size:10,bold:true,color:{argb:daysOD>60?C.red:'FFD97706'},name:'Calibri'};
      ws2.getRow(r2).getCell(10).font={size:10,bold:true,color:{argb:payAmt>0?C.green:C.textGray},name:'Calibri'};
      r2++;
    });
  }

  // Section: Due This Month
  if(dueInvs.length){
    spacer(ws2,r2); r2++;
    sectionHdr(ws2,r2,'DUE THIS MONTH — '+mLabel.label+' ('+dueInvs.length+' invoices)',13,C.teal);
    r2++;
    dueInvs.forEach(function(inv,i){
      var out = outstanding(inv);
      var isSimSel = sim.selected.some(function(c){return c.inv.id===inv.id;});
      var manAmt = cfManualSel[inv.id]!==undefined ? (cfManualSel[inv.id]||out) : null;
      var payAmt = manAmt!==null ? Math.min(manAmt,out) : (isSimSel?out:0);
      var bg = isSimSel?C.bgGreen:i%2===0?C.bgLight:C.white;
      dataRow(ws2,r2,[i+1,inv.invoiceNo,inv.vendor,(inv.lineItem||'')+(inv.lineItemRef?' ['+inv.lineItemRef+']':''),inv.type||'',deriveStatus(inv),inv.dueDate,0,N(out),payAmt!==null?N(payAmt):0,isSimSel?'✓ In Run':'Deferred',inv.canBePaid?'Yes':'No',inv.description||''],
        [null,null,null,null,null,null,null,null,AED2,AED2],bg,[8,9]);
      ws2.getRow(r2).getCell(10).font={size:10,bold:true,color:{argb:payAmt>0?C.green:C.textGray},name:'Calibri'};
      r2++;
    });
  }

  // Grand total row
  spacer(ws2,r2); r2++;
  var grandOut = allRows.reduce(function(a,inv){return a+outstanding(inv);},0);
  var grandPay = allRows.reduce(function(a,inv){
    var out=outstanding(inv);
    var isSimSel=sim.selected.some(function(c){return c.inv.id===inv.id;});
    var manAmt=cfManualSel[inv.id]!==undefined?(cfManualSel[inv.id]||out):null;
    return a+(manAmt!==null?Math.min(manAmt,out):(isSimSel?out:0));
  },0);
  hdr(ws2,r2,['','TOTAL','','','','','','',N(grandOut),N(grandPay),'','',''],C.navy,C.gold);
  [9,10].forEach(function(ci){ws2.getRow(r2).getCell(ci).numFmt=AED2;});

  // ── SHEET 3: Forward Cash Plan ────────────────────────────────────
  var ws3 = wb.addWorksheet('12-Month Cash Plan',{views:[{state:'frozen',ySplit:2}]});
  ws3.columns=[{width:18},{width:16},{width:18},{width:18},{width:18},{width:18},{width:14},{width:20}];

  titleRow(ws3,1,'12-MONTH CASH FLOW PLAN — ZULEKHA HEALTHCARE GROUP',C.navy,C.gold);
  ws3.mergeCells('A1:H1');
  hdr(ws3,2,['Month','Budget (AED)','Actual Paid','Forecast Due','Overdue B/F','Total Obligation','Coverage %','Status'],C.navy,C.white);

  var allMonths = cfMonths();
  var todayKey = TODAY.getFullYear()+'-'+String(TODAY.getMonth()+1).padStart(2,'0');
  allMonths.forEach(function(mo,i){
    var bgt  = +(STATE.cfBudget[mo.key]||0);
    var act  = cfActualForMonth(mo.key);
    var fore = cfForecastForMonth(mo.key);
    var ovd  = cfOverdueBeforeMonth(mo.key);
    var total= fore+ovd;
    var covPct = bgt>0?Math.min(total/bgt,9.99):0;
    var isCur = mo.key===todayKey;
    var isPast= mo.key<todayKey;
    var bg = isCur?C.bgAmber:isPast?'FFF9FAFB':C.white;
    var status = bgt===0?'No Budget':total===0?'No Obligations':bgt>=total?'✓ Covered':'⚠ Shortfall';
    dataRow(ws3,3+i,[mo.label,N(bgt),N(act),N(fore),N(ovd),N(total),covPct,status],[null,AED2,AED2,AED2,AED2,AED2,'0%'],bg,[5]);
    var r=ws3.getRow(3+i);
    r.getCell(2).font={size:10,bold:true,color:{argb:bgt>0?C.navy:C.textGray},name:'Calibri'};
    r.getCell(6).font={size:10,bold:true,color:{argb:total>bgt&&bgt>0?C.red:C.navy},name:'Calibri'};
    r.getCell(8).font={size:10,bold:true,color:{argb:status.indexOf('Covered')>=0?C.green:status.indexOf('Shortfall')>=0?C.red:C.textGray},name:'Calibri'};
  });

  // Download
  var buf = await wb.xlsx.writeBuffer();
  var blob = new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download=fname; a.click();
  URL.revokeObjectURL(url);
}

function cfSavePayRun(monthKey, isManual){
  var mk = monthKey;
  var months = cfMonths();
  var mLabel = months.find(function(m){return m.key===mk;})||{label:mk};
  var budget  = +(STATE.cfBudget[mk]||0);
  var sim     = cfSuggestPayments(mk, budget);

  // Build items list
  var items = [];
  if(isManual){
    Object.keys(cfManualSel).forEach(function(id){
      var inv = STATE.invoices.find(function(i){return i.id===id;});
      if(!inv) return;
      var out = outstanding(inv);
      var manAmt = cfManualSel[id]||0;
      var payAmt = manAmt>0 ? Math.min(manAmt,out) : out;
      items.push({invId:id, invoiceNo:inv.invoiceNo, vendor:inv.vendor, project:inv.project,
        lineItemRef:inv.lineItemRef, outstanding:out, plannedAmt:payAmt, isPartial:manAmt>0&&manAmt<out,
        status:'Planned', paidAmt:0, paidDate:'', paidRef:''});
    });
  } else {
    sim.selected.forEach(function(c){
      var inv=c.inv, out=outstanding(inv);
      items.push({invId:inv.id, invoiceNo:inv.invoiceNo, vendor:inv.vendor, project:inv.project,
        lineItemRef:inv.lineItemRef, outstanding:out, plannedAmt:out, isPartial:false,
        status:'Planned', paidAmt:0, paidDate:'', paidRef:''});
    });
  }

  if(!items.length){
    alert('No invoices selected. Please select invoices or run simulation first.');
    return;
  }

  var totalPlanned = items.reduce(function(a,i){return a+i.plannedAmt;},0);
  var now = new Date().toISOString();
  var runId = 'PR-'+Date.now();
  var runName = mLabel.label+' Payment Run';

  // Store pending run data in a temp variable — avoids JSON escaping in onclick
  window._pendingPayRun = {runId:runId, monthKey:mk, items:items};

  // Modal to confirm name + date
  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="max-width:460px">'
    +'<div class="modal-title">💾 Save Payment Run</div>'
    +'<div style="margin-bottom:12px">'
    +'<label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Run Name</label>'
    +'<input id="pr-name" type="text" value="'+runName+'" style="width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;box-sizing:border-box">'
    +'</div>'
    +'<div style="margin-bottom:16px">'
    +'<label style="font-size:11px;font-weight:600;color:#374151;display:block;margin-bottom:4px">Planned Payment Date</label>'
    +'<input id="pr-date" type="date" value="'+now.slice(0,10)+'" style="width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;box-sizing:border-box">'
    +'</div>'
    +'<div style="background:#F5F3FF;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px">'
    +'<div style="font-weight:700;color:#5B21B6;margin-bottom:6px">'+items.length+' invoice(s) · AED '+fmtN(totalPlanned)+' planned</div>'
    +items.slice(0,5).map(function(it){return '<div style="color:#374151;margin-bottom:2px">• '+it.invoiceNo+' — '+it.vendor+' — AED '+fmtN(it.plannedAmt)+(it.isPartial?' <span style="color:#D97706">(partial)</span>':'')+'</div>';}).join('')
    +(items.length>5?'<div style="color:#9ca3af">...and '+(items.length-5)+' more</div>':'')
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
    +'<button class="btn btn-outline" onclick="closeModal()">Cancel</button>'
    +'<button class="btn btn-primary" style="background:#7C3AED;border-color:#7C3AED" onclick="_confirmSavePayRun()">Save Payment Run</button>'
    +'</div></div></div>';
}

function _confirmSavePayRun(){
  var pending = window._pendingPayRun;
  if(!pending){ alert('No pending run data — please try again.'); return; }
  var runId    = pending.runId;
  var monthKey = pending.monthKey;
  var items    = pending.items;
  window._pendingPayRun = null;

  var name = (document.getElementById('pr-name')||{}).value || monthKey+' Payment Run';
  var plannedDate = (document.getElementById('pr-date')||{}).value || new Date().toISOString().slice(0,10);
  var totalPlanned = items.reduce(function(a,i){return a+i.plannedAmt;},0);

  var run = {
    id: runId,
    name: name,
    monthKey: monthKey,
    plannedDate: plannedDate,
    createdAt: new Date().toISOString(),
    status: 'Planned',
    totalPlanned: totalPlanned,
    items: items
  };

  if(!STATE.payRuns) STATE.payRuns=[];
  STATE.payRuns.unshift(run);
  persist();

  // Save to Supabase
  var canUseSupa = window.location && window.location.protocol !== 'file:';
  if(canUseSupa){
    _sbUpsert('pay_runs',[{
      id: run.id,
      name: run.name,
      month_key: run.monthKey,
      planned_date: run.plannedDate||null,
      created_at: run.createdAt,
      status: run.status,
      total_planned: run.totalPlanned,
      items: JSON.stringify(run.items)
    }],'id').catch(function(){});
  }

  closeModal();
  navigate('payruns');
}

function _applyPayment(runId, itemIdx){
  var run = STATE.payRuns.find(function(r){return r.id===runId;});
  if(!run) return;

  var paidAmt  = parseFloat((document.getElementById('pr-paid-amt')||{}).value)||0;
  var paidDate = (document.getElementById('pr-paid-date')||{}).value||'';
  var paidRef  = ((document.getElementById('pr-paid-ref')||{}).value||'').trim();

  if(!paidAmt||!paidDate){ alert('Amount and date are required.'); return; }

  // Update item in pay run
  run.items[itemIdx].status   = 'Paid';
  run.items[itemIdx].paidAmt  = paidAmt;
  run.items[itemIdx].paidDate = paidDate;
  run.items[itemIdx].paidRef  = paidRef;

  // Check if all items paid — auto-complete run
  var allPaid = run.items.every(function(it){return it.status==='Paid';});
  if(allPaid) run.status = 'Completed';

  // Also record on the actual invoice
  var inv = STATE.invoices.find(function(i){return i.id===run.items[itemIdx].invId;});
  if(inv){
    var newPmt = {id:'pr-'+runId+'-'+itemIdx, amount:paidAmt, date:paidDate, ref:paidRef, note:'Pay Run: '+run.name};
    var updatedInv = Object.assign({},inv,{payments:(inv.payments||[]).concat([newPmt])});
    STATE.invoices = STATE.invoices.map(function(i){return i.id===inv.id?updatedInv:i;});
    var dbPmt = {id:newPmt.id, invoice_id:inv.id, amount:paidAmt, date:paidDate, ref:paidRef, note:newPmt.note};
    sbSync(updatedInv,null,[dbPmt],null);
  }

  persist();

  // Sync run to Supabase
  var canUseSupa = window.location && window.location.protocol !== 'file:';
  if(canUseSupa){
    _sbUpsert('pay_runs',[{id:run.id, name:run.name, month_key:run.monthKey,
      planned_date:run.plannedDate||null, created_at:run.createdAt, status:run.status,
      total_planned:run.totalPlanned, items:JSON.stringify(run.items)}],'id').catch(function(e){console.warn('pay_run sync failed:',e);});
  }

  closeModal(); render();
}

function prToggleCanPay(runId, itemIdx){
  var run = STATE.payRuns.find(function(r){return r.id===runId;});
  if(!run) return;
  var it = run.items[itemIdx];
  if(!it) return;
  // Find the actual invoice and toggle canBePaid
  var inv = STATE.invoices.find(function(i){return i.id===it.invId||i.invoiceNo===it.invoiceNo;});
  if(!inv){ alert('Invoice not found in system.'); return; }
  var newVal = !inv.canBePaid;
  STATE.invoices = STATE.invoices.map(function(i){
    return (i.id===inv.id) ? Object.assign({},i,{canBePaid:newVal}) : i;
  });
  persist();
  sbSync(STATE.invoices.find(function(i){return i.id===inv.id;}),null,null,null);
  render();
}

function prMarkAllCanPay(runId, setValue){
  var run = STATE.payRuns.find(function(r){return r.id===runId;});
  if(!run) return;
  var pendingInvIds = run.items
    .filter(function(it){return it.status==='Planned';})
    .map(function(it){return it.invId||it.invoiceNo;});
  STATE.invoices = STATE.invoices.map(function(i){
    var match = pendingInvIds.indexOf(i.id)>=0 || pendingInvIds.indexOf(i.invoiceNo)>=0;
    return match ? Object.assign({},i,{canBePaid:setValue}) : i;
  });
  persist();
  // Sync all updated invoices to Supabase
  STATE.invoices.forEach(function(i){
    var match = pendingInvIds.indexOf(i.id)>=0 || pendingInvIds.indexOf(i.invoiceNo)>=0;
    if(match) sbSync(i,null,null,null);
  });
  render();
}

function prSkipItem(runId, itemIdx){
  var run = STATE.payRuns.find(function(r){return r.id===runId;});
  if(!run) return;
  run.items[itemIdx].status = 'Skipped';
  persist();
  var canUseSupa = window.location && window.location.protocol !== 'file:';
  if(canUseSupa) _sbUpsert('pay_runs',[{id:run.id,name:run.name,month_key:run.monthKey,planned_date:run.plannedDate||'',created_at:run.createdAt,status:run.status,total_planned:run.totalPlanned,items:JSON.stringify(run.items)}],'id').catch(function(){});
  render();
}

function prDeleteRun(runId){
  if(!confirm('Delete this payment run? This will NOT reverse any recorded payments.')) return;
  STATE.payRuns = STATE.payRuns.filter(function(r){return r.id!==runId;});
  persist();
  var canUseSupa = window.location && window.location.protocol !== 'file:';
  if(canUseSupa) _sbDelete('pay_runs', runId).catch(function(){});
  render();
}

function syncPayRunsToSupabase(){
  var runs = STATE.payRuns||[];
  if(!runs.length){ alert('No pay runs to sync.'); return; }
  var canUseSupa = window.location && window.location.protocol !== 'file:';
  if(!canUseSupa){ alert('Not connected to Supabase.'); return; }
  var rows = runs.map(function(r){
    return {id:r.id, name:r.name, month_key:r.monthKey,
      planned_date:r.plannedDate||null, created_at:r.createdAt,
      status:r.status, total_planned:r.totalPlanned,
      items:JSON.stringify(r.items)};
  });
  _sbUpsert('pay_runs', rows, 'id').then(function(){
    var f=document.getElementById('saved-flash');
    if(f){f.textContent='✓ '+runs.length+' pay run(s) synced to Supabase';f.style.display='inline';f.style.color='#7C3AED';
      clearTimeout(f._t);f._t=setTimeout(function(){f.style.display='none';f.style.color='#10B981';},3000);}
  }).catch(function(e){
    alert('Sync failed: '+e.message);
  });
}
