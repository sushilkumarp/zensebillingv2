// ── Cash Flow ─────────────────────────────────────────────────────────────
var CF_MONTHS_BACK = 3;
var CF_MONTHS_FWD  = 9;
var cfManualMode   = false;          // false = auto simulation, true = manual
var cfManualSel    = {};             // {invId: partialAmount} — 0 means full outstanding

function cfMonths(){
  var months=[], d=new Date(TODAY.getFullYear(), TODAY.getMonth()-CF_MONTHS_BACK, 1);
  for(var i=0;i<CF_MONTHS_BACK+CF_MONTHS_FWD+1;i++){
    var y=d.getFullYear(), m=d.getMonth();
    months.push({key: y+'-'+String(m+1).padStart(2,'0'), label: d.toLocaleString('en-AE',{month:'short',year:'numeric'}), y:y, m:m });
    d.setMonth(d.getMonth()+1);
  }
  return months;
}

function cfActualForMonth(monthKey){
  // Sum of payments made (payment.date starts with monthKey)
  var total=0;
  STATE.invoices.forEach(function(inv){
    (inv.payments||[]).forEach(function(p){
      if(p.date && p.date.startsWith(monthKey)) total += +(p.amount||0);
    });
  });
  return total;
}

function cfForecastForMonth(monthKey){
  // Outstanding balance of invoices with dueDate in this month
  var total=0;
  STATE.invoices.forEach(function(inv){
    if(inv.dueDate && inv.dueDate.startsWith(monthKey)){
      total += outstanding(inv);
    }
  });
  return total;
}

function cfDueInvoicesForMonth(monthKey){
  // All invoices with dueDate in this month that have outstanding balance
  return STATE.invoices.filter(function(inv){
    return inv.dueDate && inv.dueDate.startsWith(monthKey) && outstanding(inv)>0;
  }).sort(function(a,b){
    // Overdue first, then by amount desc
    var sa=deriveStatus(a), sb=deriveStatus(b);
    if(sa==='Overdue'&&sb!=='Overdue') return -1;
    if(sb==='Overdue'&&sa!=='Overdue') return  1;
    return outstanding(b)-outstanding(a);
  });
}

function cfOverdueBeforeMonth(monthKey){
  // Overdue invoices from BEFORE this month (not yet paid)
  var total=0;
  STATE.invoices.forEach(function(inv){
    if(inv.dueDate && inv.dueDate < monthKey+'-01' && outstanding(inv)>0){
      total += outstanding(inv);
    }
  });
  return total;
}

function cfSuggestPayments(monthKey, budget){
  // Simulation runs on ALL outstanding invoices — no Can Pay filter
  // Can Pay is SET by the user AFTER reviewing/approving the simulation
  var overdue=[], dueThisMonth=[], dueFuture=[];

  STATE.invoices.forEach(function(inv){
    if(outstanding(inv)<=0) return;
    if(!inv.dueDate) return;
    var _daysOD = inv.dueDate < monthKey+'-01'
      ? Math.floor((TODAY - new Date(inv.dueDate)) / 86400000)
      : 0;
    if(inv.dueDate < monthKey+'-01'){
      overdue.push({inv:inv, priority:0, label:'Overdue', daysOD:_daysOD});
    } else if(inv.dueDate.startsWith(monthKey)){
      dueThisMonth.push({inv:inv, priority:1, label:'Due this month', daysOD:0});
    } else {
      dueFuture.push({inv:inv, priority:2, label:'Future', daysOD:0});
    }
  });

  // Sort each bucket: oldest due date first, then largest amount
  // Primary sort: overdue by days OD descending (most days overdue = pay first)
  // Secondary: amount descending (larger amounts resolved first)
  overdue.sort(function(a,b){ return b.daysOD - a.daysOD; });
  var byDate = function(a,b){ return (a.inv.dueDate||'').localeCompare(b.inv.dueDate||''); };
  dueThisMonth.sort(byDate);
  dueFuture.sort(byDate);

  var candidates = overdue.concat(dueThisMonth); // only overdue + due this month in run
  var remaining=budget, selected=[], skipped=[];
  candidates.forEach(function(c){
    var out=outstanding(c.inv);
    if(remaining>=out){ selected.push(c); remaining-=out; }
    else { skipped.push(c); }
  });
  return {
    selected:selected,
    skipped:skipped,
    remaining:remaining,
    overdueCnt:overdue.length,
    dueThisMonthCnt:dueThisMonth.length,
    totalCandidates:candidates.length
  };
}

// Approve: mark all suggested invoices as Can Pay = Yes, deferred as No
function cfApproveSimulation(monthKey){
  var budget = +(STATE.cfBudget[monthKey]||0);
  if(!budget){ alert('Please set a cash budget for this month first.'); return; }
  var sim = cfSuggestPayments(monthKey, budget);
  var approvedIds  = new Set(sim.selected.map(function(c){return c.inv.id;}));
  var deferredIds  = new Set(sim.skipped.map(function(c){return c.inv.id;}));
  STATE.invoices = STATE.invoices.map(function(inv){
    if(approvedIds.has(inv.id))  return Object.assign({},inv,{canBePaid:true});
    if(deferredIds.has(inv.id))  return Object.assign({},inv,{canBePaid:false});
    return inv;
  });
  persist();
  render();
}

// Manual mode: toggle a checkbox
function cfToggleManual(invId){
  if(cfManualSel[invId]!==undefined){ delete cfManualSel[invId]; }
  else { cfManualSel[invId]=0; }
  render(); // full re-render so pay amount input appears/disappears
}

// Manual mode: update partial amount for an invoice
function cfSetPartial(invId, val){
  if(cfManualSel[invId]!==undefined){
    cfManualSel[invId] = Math.max(0, parseFloat(val)||0);
  }
  cfUpdateManualTotals(); // lightweight DOM update only, no full re-render
}

// Recalculate and update the live totals bar without full re-render
function cfUpdateManualTotals(){
  var total=0;
  Object.keys(cfManualSel).forEach(function(id){
    var inv=STATE.invoices.find(function(i){return i.id===id;});
    if(inv){
      var amt = cfManualSel[id]||0;
      total += amt>0 ? Math.min(amt,outstanding(inv)) : outstanding(inv);
    }
  });
  var el=document.getElementById('cf-manual-total');
  if(el) el.textContent='AED '+fmtN(total);
  var cnt=document.getElementById('cf-manual-count');
  if(cnt) cnt.textContent=Object.keys(cfManualSel).length+' selected';
  var budget=+(document.getElementById('cf-budget-inp')?+(document.getElementById('cf-budget-inp').value||0):0);
  var remEl=document.getElementById('cf-manual-rem');
  if(remEl&&budget>0){ var rem=budget-total; remEl.textContent='AED '+fmtN(rem); remEl.style.color=rem>=0?'#059669':'#DC2626'; }
}

// Apply manual selections as Can Pay
function cfApplyManual(){
  var selectedIds = new Set(Object.keys(cfManualSel));
  STATE.invoices = STATE.invoices.map(function(inv){
    if(selectedIds.has(inv.id)){
      var partAmt = cfManualSel[inv.id]||0;
      return Object.assign({},inv,{canBePaid:true, manualPayAmt: partAmt>0?partAmt:null});
    } else {
      return Object.assign({},inv,{canBePaid:false, manualPayAmt:null});
    }
  });
  persist();
  render();
}

    var isToday  = mo.key === todayKey;
    var isPast   = mo.key < todayKey;
    var totalObl = forecast + overdue;
    var variance = budget - totalObl;
    var utilPct  = budget>0?Math.min(Math.round(totalObl/budget*100),999):0;
    totalForecast += (isPast?actual:forecast);
    totalActual   += actual;
    totalBudget   += budget;

    var rowBg = isToday?'#FFFBEB':isPast?'#FAFAFA':'#FFFFFF';

    return '<tr style="cursor:pointer;background:'+rowBg+'" onclick="cfDrillMonth=\''+mo.key+'\';render()" class="hover-row">'

      +'<td class="r" style="font-weight:700;color:'+(totalObl>0?'#1B2A4A':'#9ca3af')+'">'+(totalObl>0?fmtN(totalObl):'&mdash;')+'</td>'

      +'<td class="r" style="font-weight:600;color:'+varColor+'">'+(budget>0?(variance>=0?'+':'')+fmtN(variance):'&mdash;')+'</td>'

      +'<td><span style="color:#6b7280;font-size:12px">&#8250;</span></td>'
      +'</tr>';
  });

  var openPayables = STATE.invoices.reduce(function(a,inv){return a+outstanding(inv);},0);
  var overdueTotal = STATE.invoices.reduce(function(a,inv){var s=deriveStatus(inv);return a+(s==='Overdue'||s==='Partial'?outstanding(inv):0);},0);

  var nextMonthForecast = cfForecastForMonth(nextMonthKey);

  return '<div class="page">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    +'<div class="page-title">Cash Flow <span style="font-size:13px;font-weight:400;color:#6b7280">'+CF_MONTHS_BACK+' months back · '+CF_MONTHS_FWD+' months ahead</span></div>'
    +'</div>'
    // KPI cards
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +'<div class="card" style="padding:14px 16px;border-top:3px solid #DC2626"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Total Open Payables</div><div style="font-size:22px;font-weight:700;color:#DC2626">AED '+fmtN(openPayables)+'</div><div style="font-size:10px;color:#6b7280;margin-top:4px">Outstanding across all invoices</div></div>'

    +'<div class="card" style="padding:14px 16px;border-top:3px solid #059669"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Approved for Payment</div><div style="font-size:22px;font-weight:700;color:#059669">AED '+fmtN(approvedPending)+'</div><div style="font-size:10px;color:#6b7280;margin-top:4px">Marked Can Pay = Yes</div></div>'
    +'<div class="card" style="padding:14px 16px;border-top:3px solid #1B2A4A"><div style="font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Next Month Forecast</div><div style="font-size:22px;font-weight:700;color:#1B2A4A">AED '+fmtN(nextMonthForecast)+'</div><div style="font-size:10px;color:#6b7280;margin-top:4px">Due in next calendar month</div></div>'
    +'</div>'
    // Table
    +'<div class="card"><div style="overflow-x:auto"><table>'
    +'<thead><tr>'
    +'<th style="min-width:110px"><div style="padding:8px 10px">Month</div></th>'
    +'<th class="r" style="min-width:120px;background:#EFF6FF"><div style="padding:8px 10px;color:#1E40AF">Cash Budget</div></th>'
    +'<th class="r" style="min-width:110px;background:#F0FDF4"><div style="padding:8px 10px;color:#065F46">Actual Paid</div></th>'
    +'<th class="r" style="min-width:110px"><div style="padding:8px 10px">Forecast Due</div></th>'
    +'<th class="r" style="min-width:100px;background:#FEF2F2"><div style="padding:8px 10px;color:#DC2626">Overdue C/F</div></th>'
    +'<th class="r" style="min-width:110px"><div style="padding:8px 10px">Total Needed</div></th>'
    +'<th class="r" style="min-width:100px"><div style="padding:8px 10px">Variance</div></th>'
    +'<th style="min-width:140px"><div style="padding:8px 10px">Budget Used</div></th>'
    +'<th style="width:24px"></th>'
    +'</tr></thead>'
    +'<tbody>'+rows.join('')+'</tbody>'
    +'<tfoot><tr class="tfoot">'
    +'<td>Total ('+months.length+' months)</td>'
    +'<td class="r">'+fmtN(totalBudget)+'</td>'
    +'<td class="r">'+fmtN(totalActual)+'</td>'
    +'<td class="r">'+fmtN(totalForecast)+'</td>'
    +'<td class="r"></td>'
    +'<td class="r"></td>'
    +'<td class="r" style="color:'+(totalBudget>=totalForecast?'#059669':'#DC2626')+'">'+(totalBudget>0?(totalBudget-totalForecast>=0?'+':'')+fmtN(totalBudget-totalForecast):'&mdash;')+'</td>'
    +'<td colspan="2"></td>'
    +'</tr></tfoot>'
    +'</table></div></div>'
    +'<style>.hover-row:hover{background:#F8FAFF!important;transition:background .15s}</style>'
    +'</div>';
}

    var capI=pi2.filter(function(i){return i.type==='CAPEX';}).reduce(function(a,i){return a+(i.invoiceAmt||0);},0);
    var opI=pi2.filter(function(i){return i.type==='OPEX';}).reduce(function(a,i){return a+(i.invoiceAmt||0);},0);
    dataRow(ws9,aOff+2+pi,[p,N(capB),N(opB),capI>0?N(capI):null,opI>0?N(opI):null],[AED2,AED2,AED2,AED2,AED2],pi%2===0?'FFFBFCFD':C.white);
  });
  // Outstanding by status
  var sOff=aOff+2+sections.length+2;
  sectionHdr(ws9,sOff,'INVOICE STATUS BREAKDOWN (use for pie chart)',3,'FF7C3AED');
  hdr(ws9,sOff+1,['Status','Count','Total Amount (AED)'],C.navy,C.white);

  });

  // ════════════════════════════════════════════════════════════════
  // SHEET 10 — OH Agreement Parts

  if(typeof OHP!=='undefined'&&OHP.length>0){

// ── Export Live HTML (bakes current STATE into SEED data) ─────────────────
function exportLiveHTML(){
  try {
    var inv  = STATE.invoices;
    var bud  = STATE.budget;
    var proj = STATE.projects;

    // Serialise invoices as JS literal
    function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
    function serInv(i){
      var pmts=(i.payments||[]).map(function(p){
        return '{'+
          (p.id?'id:\''+esc(p.id)+'\',':'')+
          'amount:'+(p.amount||0)+','+
          'date:\''+esc(p.date||'')+'\','+
          'ref:\''+esc(p.ref||'')+'\','+
          'note:\''+esc(p.note||'')+'\''+
        '}';
      }).join(',');
      return '  {'+
        'id:\''+esc(i.id)+'\','+
        'invoiceNo:\''+esc(i.invoiceNo)+'\','+
        'project:\''+esc(i.project)+'\','+
        'lineItem:\''+esc(i.lineItem||'')+'\','+
        'lineItemRef:\''+esc(i.lineItemRef||'')+'\','+
        'vendor:\''+esc(i.vendor)+'\','+
        'type:\''+esc(i.type||'CAPEX')+'\','+
        'invoiceAmt:'+(i.invoiceAmt||0)+','+
        'invoiceDate:\''+esc(i.invoiceDate||'')+'\','+
        'dueDate:\''+esc(i.dueDate||'')+'\','+
        'paymentTerms:\''+esc(i.paymentTerms||'')+'\','+
        'payments:['+(pmts||'')+'],'+
        (i.status?'status:\''+esc(i.status)+'\',':'')+
        'currency:\''+esc(i.currency||'AED')+'\','+
        'description:\''+esc(i.description||'')+'\','+
        (i.canBePaid!==undefined?'canBePaid:'+(i.canBePaid?'true':'false'):'canBePaid:false')+
      '}';
    }

    var newSeedInvoices = 'const SEED_INVOICES = [\n'+inv.map(serInv).join(',\n')+'\n];';

    // Get current HTML
    var html = document.documentElement.outerHTML;

    // Replace SEED_INVOICES block
    var startMarker = 'const SEED_INVOICES = [';
    var endMarker = '\n];';
    var si = html.indexOf(startMarker);
    if(si<0){ alert('Could not find SEED_INVOICES in HTML'); return; }
    var ei = html.indexOf(endMarker, si) + endMarker.length;
    html = html.slice(0,si) + newSeedInvoices + html.slice(ei);

    // Clear the localStorage delta keys so the baked data is used fresh
    html = html.replace(
      /localStorage\.setItem\('zense-billing-v7-delta'/g,
      '// localStorage.setItem(\'zense-billing-v7-delta\''
    );

    // Update version note with export timestamp
    var now = new Date();
    var ts = now.toLocaleDateString('en-AE',{day:'2-digit',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('en-AE',{hour:'2-digit',minute:'2-digit',hour12:true});
    html = html.replace(
      /<!-- Exported:.*?-->/,
      '<!-- Exported: '+ts+' -->'
    );

    // Download
    var blob = new Blob([html], {type:'text/html'});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    var fname= 'Zense_Billing_LIVE_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0')+'.html';
    a.href=url; a.download=fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Flash confirmation
    var fl=document.getElementById('saved-flash');
    if(fl){ fl.textContent='✓ App saved!'; fl.style.opacity=1; setTimeout(function(){fl.style.opacity=0;fl.textContent='✓ Saved';},3000); }
  } catch(e) {
    alert('Save App error: '+e.message);
    console.error(e);
  }
}

function upProcessFile(file){
  _upFileName = file.name;
  _upFileType = file.type || (file.name.endsWith('.pdf')?'application/pdf':'image/jpeg');

  var dz=document.getElementById('upload-dropzone');

  var reader = new FileReader();
  reader.onload = function(ev){

// ── Mastek project disambiguation ────────────────────────────────────────
// Corrects AI misclassification: "HEALTH CLOUD IMPLN" + Mastek = Salesforce (not Oracle Health)
function mastekProjectOverride(ex){
  if(!ex || ex.vendor !== 'Mastek') return ex;
  var desc = ((ex.description||'')+''+( ex.lineItem||'')+''+( ex.matchNotes||'')).toUpperCase();
  var hasCPQ   = /B[89][0-9]{4}/.test(desc);           // Oracle CPQ part numbers
  var hasSFHC  = /HEALTH CLOUD IMPLN|SF IMPL|HEALTH CLOUD IMP|HC IMPL|MKTG CLOUD|MARKETING CLOUD|SALESFORCE|OPPORTUNITY ENHANCEMENT/.test(desc);
  var hasEnhCR = /ENHANCEMENT CR|CHANGE REQUEST|AD.HOC|ADDITIONAL HOURS|OPPORTUNITY/.test(desc);
  var hasOH    = /HIMANSHU|PHARMACY|MANAGED SERVICE|P019|P020|P021/.test(desc); // Oracle Health signals

  if(!hasCPQ && !hasOH && (hasSFHC || hasEnhCR) && ex.project === 'Oracle Health'){
    ex.project      = 'Salesforce';
    ex.matchNotes   = (ex.matchNotes||'') + ' [Auto-corrected: HEALTH CLOUD IMPLN + Mastek = Salesforce, not Oracle Health]';
    ex.confidence   = 'Medium';
    // Map to Salesforce Opportunity Enhancement CR / M3 Build
    if(hasEnhCR || hasSFHC){
      // Check if it's a specific milestone
      var descU=(ex.description||ex.lineItem||'').toUpperCase();
      if(/BUILD FOR HEALTH CLOUD|M3.*HEALTH|HEALTH.*M3|MILESTONE 3.*HEALTH/.test(descU)){
        ex.lineItem='Implementation Cost (M3)'; ex.lineItemRef='LI-JLT7UE'; ex.type='CAPEX';
      } else if(/ROLLOUT FOR HEALTH CLOUD|M4.*HEALTH|HEALTH.*M4|MILESTONE 4.*HEALTH/.test(descU)){
        ex.lineItem='MC - M4: Rollout for Health Cloud'; ex.lineItemRef='LI-BZ45W8'; ex.type='CAPEX';
      } else if(/BUILD FOR MARKETING|MC.*M3|MARKETING.*BUILD|MKTG.*BUILD/.test(descU)){
        ex.lineItem='MC - M3: Build for Marketing Cloud'; ex.lineItemRef='LI-C35E5D'; ex.type='CAPEX';
      } else if(/ROLLOUT FOR MARKETING|MC.*M4|MARKETING.*ROLLOUT/.test(descU)){
        ex.lineItem='MC - M4: Rollout for Marketing Cloud'; ex.lineItemRef='LI-789666'; ex.type='CAPEX';
      } else if(/HYPERCARE|M5/.test(descU)){
        ex.lineItem='Implementation Cost (M5 Hypercare)'; ex.lineItemRef='LI-0CUDY3'; ex.type='CAPEX';
      } else {
        // Default to M3 for generic Enhancement/Build references
        ex.lineItem='Implementation Cost (M3)'; ex.lineItemRef='LI-JLT7UE'; ex.type='CAPEX';
      }
    }
  }
  return ex;
}


function upPopulateForm(d){
  // Hide status, show result
  document.getElementById('up-status').style.display='none';
  document.getElementById('up-result').style.display='block';

  // Set confidence badge
  var conf = d.confidence||'Medium';
  var confColor = conf==='High'?'#065F46':conf==='Medium'?'#92400E':'#991B1B';
  var confBg = conf==='High'?'#D1FAE5':conf==='Medium'?'#FEF3C7':'#FEE2E2';
  document.getElementById('up-conf-badge').innerHTML =
    '<span style="background:'+confBg+';color:'+confColor+';padding:1px 8px;border-radius:100px;font-weight:600">'+conf+' confidence</span>'
    +(d.matchNotes?' &nbsp;<span style="color:#6b7280">'+d.matchNotes+'</span>':'');

  // Fill basic fields
  var set = function(id,val){ var el=document.getElementById(id); if(el&&val)el.value=val; };
  set('up-invno', d.invoiceNo);
  set('up-vendor', d.vendor);
  set('up-amt', d.invoiceAmt);
  set('up-date', d.invoiceDate);
  set('up-due', d.dueDate);
  set('up-desc', d.description);
  // ── Universal USD → AED conversion ─────────────────────────────────────
  // All invoices are recorded in AED. If AI returned USD, convert automatically.
  var EXCHANGE_RATE = 3.6725; // Standard AED/USD rate (verify on invoice if different)
  var cc = document.getElementById('up-ccy');
  if(cc) cc.value = 'AED'; // Always set to AED

  if(d.currency === 'USD' && d.invoiceAmt && +d.invoiceAmt > 0){
    // Check if invoice has an explicit AED total (AI should have extracted it, but fallback)
    var aedAmt = Math.round(+d.invoiceAmt * EXCHANGE_RATE * 100) / 100;
    var amtEl  = document.getElementById('up-amt');
    if(amtEl) amtEl.value = aedAmt;
    // Show conversion notice
    var confBadge = document.getElementById('up-conf-badge');
    if(confBadge){
      confBadge.innerHTML += ' &nbsp;<span style="background:#FEF3C7;color:#92400E;padding:1px 8px;border-radius:100px;font-size:10px;font-weight:600">'
        + '⚠ USD ' + (+d.invoiceAmt).toLocaleString() + ' × ' + EXCHANGE_RATE
        + ' = AED ' + aedAmt.toLocaleString() + ' — verify AED total on invoice</span>';
    }
    // Update d so downstream checks (variance) use the AED amount
    d.invoiceAmt = aedAmt;
    d.currency   = 'AED';
  }

  // Payment terms — Oracle Health is ALWAYS Net 60 Days per CPQ-3601128
  var effectivePT = (d.project==='Oracle Health' || d.vendor==='Oracle Health')
    ? 'Net 60 Days'
    : (d.paymentTerms||'');
  if(effectivePT){
    var ptEl=document.getElementById('up-terms');
    if(ptEl){
      ptEl.value=effectivePT;
      // If exact match not found, try fuzzy
      if(!ptEl.value || ptEl.value!==effectivePT){
        Array.from(ptEl.options).forEach(function(o){
          if(o.value.toLowerCase().indexOf(effectivePT.toLowerCase())>=0) ptEl.value=o.value;
        });
      }
    }
  }
  // Show override notice if invoice stated different terms
  if((d.project==='Oracle Health'||d.vendor==='Oracle Health') && d.paymentTerms && d.paymentTerms!=='Net 60 Days'){
    var confBadge=document.getElementById('up-conf-badge');
    if(confBadge) confBadge.innerHTML+=' &nbsp;<span style="background:#FEF3C7;color:#92400E;padding:1px 8px;border-radius:100px;font-size:10px;font-weight:600">⚠ Invoice says '+d.paymentTerms+' — overridden to Net 60 Days per CPQ-3601128</span>';
  }

  // Project
  if(d.project){
    var projSel=document.getElementById('up-proj');
    if(projSel){ Array.from(projSel.options).forEach(function(o){ if(o.value===d.project) projSel.value=d.project; }); }
    upProjChange();
  }

  // Line item - after project options are populated
  setTimeout(function(){
    if(d.lineItemRef||d.lineItem){
      var liSel=document.getElementById('up-li');
      var codeFieldEl=document.getElementById('up-li-code');
      if(codeFieldEl&&d.lineItemRef)codeFieldEl.value=d.lineItemRef;
      if(liSel){
        // Priority 1: exact LI ref match — prevents wrong selection when multiple items share same name
        var refMatch=null, nameMatch=null;
        Array.from(liSel.options).forEach(function(o){
          if(!o.value) return;
          var parts=o.value.split('|');
          if(d.lineItemRef && parts[0]===d.lineItemRef){ refMatch=o.value; }
          else if(!nameMatch && d.lineItem && parts[1]===d.lineItem){ nameMatch=o.value; }
        });
        var chosen=refMatch||nameMatch;
        if(chosen){ liSel.value=chosen; }
        upLIChange();
      }
    }
  }, 50);

  // If description contains a known part number with explicit project mapping, use it
  if(d.description){
    var partNums=d.description.match(/[A-Z]\d{4,6}/g)||[];
    for(var _p=0;_p<partNums.length;_p++){
      var _m=LI_MAP[partNums[_p]];
      if(_m&&_m.project){
        // Override project if different
        if(d.project!==_m.project){
          d.project=_m.project;
          d.lineItemRef=_m.li;
          d.lineItem=_m.liName;
          d.vendor=_m.vendor||d.vendor;
          var confEl=document.getElementById('up-conf-badge');
          if(confEl)confEl.innerHTML+=' <span style="background:#FEF3C7;color:#92400E;padding:1px 8px;border-radius:100px;font-size:10px;font-weight:600">'
            +'⚠ Part '+partNums[_p]+' → overriding to '+_m.project+' / '+_m.li+'</span>';
        }
        break;
      }
    }
  }
  // Run all 4 checks and show results
  var checks = upRunChecks(d);
  upShowChecks(checks, d);

  // Agreement check for Oracle Health
  if(d.project==='Oracle Health'){
    document.getElementById('up-agree-wrap').style.display='block';
    var agreeLabel=document.querySelector('#up-agree-wrap label');
    if(agreeLabel)agreeLabel.textContent='Agreement Check (CPQ-3601128)';
    upShowAgreement(d.description||'');
  } else if(d.project==='Oracle Fusion ERPM'){
    document.getElementById('up-agree-wrap').style.display='block';
    var agreeLabel2=document.querySelector('#up-agree-wrap label');
    if(agreeLabel2)agreeLabel2.textContent='Agreement Check (CPQ-4114731 / CPQ-3679459 / CPQ-4190591)';
    upShowOFAgreement(d.description||'');
  } else if(d.project==='Pharmacy POS'){
    document.getElementById('up-agree-wrap').style.display='block';
    var agreeLabelHS=document.querySelector('#up-agree-wrap label');
    if(agreeLabelHS)agreeLabelHS.textContent='Agreement Check (Headstart SOW — Dec 2025)';
    upShowHSAgreement(d.lineItemRef||'',d.invoiceAmt||0);
  }
}

function upRunChecks(d){
  var results = [];
  var inv = STATE.invoices, bud = STATE.budget;
  var newAmt = +d.invoiceAmt || 0;

  // 1. Duplicate check
  var isDup = inv.some(function(i){ return i.invoiceNo===d.invoiceNo; });
  results.push({ label:'Duplicate Check', ok:!isDup,
    msg: isDup ? 'Invoice '+d.invoiceNo+' already exists in Actuals — cannot post again.'
               : 'Invoice '+d.invoiceNo+' is new — not a duplicate.' });

  // 2. Budget line match + variance (smart: cumulative for OPEX recurring)
  var bl = bud.find(function(b){ return b.ref===d.lineItemRef; })
         || bud.find(function(b){ return b.project===d.project&&b.name===d.lineItem; });
  if(bl){
    var isRecurring = bl.freq && bl.freq!=='one-time';
    var isOpex      = bl.type==='OPEX';

    // Sum all prior invoices on this line
    var priorOnLine = inv.filter(function(i){
      return (i.lineItemRef===bl.ref || (i.project===bl.project&&i.lineItem===bl.name));
    });
    var ytdInvoiced = priorOnLine.reduce(function(a,i){return a+(+i.invoiceAmt||0);},0);
    var ytdAfterThis = ytdInvoiced + newAmt;

    results.push({ label:'Budget Match', ok:true,
      msg:'Matched: '+bl.name+' ('+bl.ref+') — Budget AED '+fmtN(bl.total)
        +(isRecurring?' ('+bl.freq+')':'') });

    if(isRecurring && isOpex){
      // For OPEX recurring: check cumulative spend vs budget, not single invoice
      var cumPct  = bl.total>0 ? Math.round(ytdAfterThis/bl.total*100) : 0;
      var overBudget = ytdAfterThis > bl.total;
      var singlePct = bl.total>0 ? Math.round(newAmt/bl.total*100) : 0;
      results.push({ label:'Amount Variance', ok:!overBudget,
        msg: overBudget
          ? 'Cumulative AED '+fmtN(ytdAfterThis)+' exceeds budget AED '+fmtN(bl.total)+' — over by AED '+fmtN(ytdAfterThis-bl.total)+'.'
          : 'This invoice is AED '+fmtN(newAmt)+' ('+singlePct+'% of annual budget). '
            +'YTD total after posting: AED '+fmtN(ytdAfterThis)+' ('+cumPct+'% used). '
            +(cumPct<=100?'Within annual budget.':'Budget exceeded.')
      });
    } else {
      // For CAPEX / one-time: compare single invoice to budget
      var diff = Math.abs(newAmt - bl.total);
      var pct  = bl.total>0 ? Math.round(diff/bl.total*100) : 0;
      results.push({ label:'Amount Variance', ok:pct<15,
        msg: pct===0 ? 'Amount matches budget exactly.'
           : pct<15  ? 'Variance AED '+fmtN(diff)+' ('+pct+'%) — within tolerance.'
                     : 'Variance AED '+fmtN(diff)+' ('+pct+'%) — significant, please review.' });
    }
  } else {
    results.push({ label:'Budget Match', ok:false,
      msg:'No budget line found for ref '+d.lineItemRef+' or line item "'+d.lineItem+'". Select manually.' });
  }

  // 3. Recurring history
  var prior = inv.filter(function(i){
    return i.project===d.project && i.lineItem===d.lineItem && i.invoiceNo!==d.invoiceNo;
  });
  if(prior.length){
    var last=prior[prior.length-1];
    var amtMatch=Math.abs(newAmt-(+last.invoiceAmt||0))<1;
    results.push({ label:'Recurring History', ok:true,
      msg:prior.length+' prior invoice(s) on this line. Last: '+last.invoiceNo
        +' AED '+fmtN(last.invoiceAmt)+(amtMatch?' — amount matches.':' — amount differs.') });
  } else {
    results.push({ label:'Recurring History', ok:true, msg:'First invoice on this line item.' });
  }

  // 4. Overdue on same line
  var overdue = inv.filter(function(i){
    var s=deriveStatus(i);
    return i.project===d.project&&i.lineItem===d.lineItem&&(s==='Overdue'||s==='Partial');
  });
  if(overdue.length){
    results.push({ label:'Prior Overdue', ok:false,
      msg:overdue.length+' prior invoice(s) on this line still Overdue/Partial. Resolve before posting.' });
  } else {
    results.push({ label:'Prior Overdue', ok:true, msg:'No overdue invoices on this line.' });
  }

  return results;
}

function upShowChecks(checks, d){
  var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px">';
  checks.forEach(function(c){
    html += '<div style="background:'+(c.ok?'#F0FDF4':'#FEF3C7')+';border:1px solid '+(c.ok?'#6EE7B7':'#FDE68A')+';border-radius:6px;padding:7px 10px">';
    html += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">';
    html += '<span style="font-size:13px">'+(c.ok?'✓':'⚠')+'</span>';
    html += '<span style="font-weight:600;font-size:11px;color:'+(c.ok?'#065F46':'#92400E')+'">'+c.label+'</span>';
    html += '</div>';
    html += '<div style="font-size:10px;color:'+(c.ok?'#374151':'#92400E')+'">'+c.msg+'</div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('up-checks').innerHTML = html;
}

  }
  err.style.display='none';

  }

  updateStageBadge();
  navigate('staging');
}



function runInvoiceChecks(d){
  var checks=[], inv=STATE.invoices, bud=STATE.budget;
  var isDup=inv.some(function(i){return i.invoiceNo===d.invoiceNo;});
  checks.push(isDup?{s:'err',m:'DUPLICATE — Invoice '+d.invoiceNo+' already exists in Actuals.'}:{s:'ok',m:'Invoice number '+d.invoiceNo+' is new — not a duplicate.'});
  var bl=bud.find(function(b){return b.ref===d.lineItemRef;})||bud.find(function(b){return b.project===d.project&&b.name===d.lineItem;});
  if(bl){checks.push({s:'ok',m:'Budget line matched: '+bl.name+' ('+bl.ref+')'});var diff=Math.abs(d.invoiceAmt-bl.total),pct=bl.total>0?diff/bl.total:0;if(pct<0.01)checks.push({s:'ok',m:'Amount AED '+(d.invoiceAmt||0).toLocaleString('en-AE',{minimumFractionDigits:2})+' matches budget exactly.'});else if(pct<0.15)checks.push({s:'warn',m:'Amount differs from budget by AED '+(diff).toLocaleString('en-AE',{minimumFractionDigits:2})+' ('+Math.round(pct*100)+'%) — review.'});else checks.push({s:'warn',m:'Amount differs from budget by AED '+(diff).toLocaleString('en-AE',{minimumFractionDigits:2})+' ('+Math.round(pct*100)+'%) — significant.'});}
  else{checks.push({s:'warn',m:'No exact budget line match for '+d.lineItemRef+'. Verify manually.'});}
  var prior=inv.filter(function(i){return i.project===d.project&&i.lineItem===d.lineItem&&i.invoiceNo!==d.invoiceNo;}).sort(function(a,b){return b.invoiceDate>a.invoiceDate?1:-1;});
  var blf=bl?bl.freq:'';
  if(prior.length){var last=prior[0],amtOk=Math.abs(d.invoiceAmt-last.invoiceAmt)/(last.invoiceAmt||1)<0.05;checks.push({s:amtOk?'ok':'warn',m:'Recurring: '+prior.length+' prior invoice'+(prior.length>1?'s':'')+' on this line. Last: '+last.invoiceNo+' on '+last.invoiceDate+' AED '+(last.invoiceAmt||0).toLocaleString('en-AE',{minimumFractionDigits:2})+(amtOk?'':' — amount differs.')});}
  else{checks.push(blf&&blf!=='one-time'?{s:'warn',m:'First invoice for this recurring ('+blf+') line — confirm expected.'}:{s:'ok',m:'First invoice for this line item — no prior history.'});}
  var ov=inv.filter(function(i){return i.project===d.project&&i.lineItem===d.lineItem&&(deriveStatus(i)==='Overdue'||deriveStatus(i)==='Partial');});
  if(ov.length){checks.push({s:'warn',m:''+ov.length+' prior invoice'+(ov.length>1?'s':'')+' on this line still Overdue/Partial (AED '+(ov.reduce(function(a,b){return a+(b.invoiceAmt||0);},0)).toLocaleString('en-AE',{minimumFractionDigits:2})+' outstanding).'});}
  var hasErr=checks.some(function(c){return c.s==='err';}),hasWarn=checks.some(function(c){return c.s==='warn';});
  var rec=hasErr?{t:'dup',l:'DO NOT POST \u2014 Duplicate',d:'Invoice number exists in Actuals. Cannot stage.'}:hasWarn?{t:'review',l:'Review Before Posting',d:'Warnings found \u2014 review before staging.'}:{t:'ok',l:'OK to Stage',d:'All checks passed. Safe to move to Staging.'};
  return{checks:checks,rec:rec,prior:prior};
}

function confirmStageExtracted(){
  if(!LAST_EXTRACTED)return;
  var result=runInvoiceChecks(LAST_EXTRACTED);
  if(result.rec.t==='dup'){alert('Cannot stage \u2014 duplicate.');return;}
  var d=LAST_EXTRACTED;
  STATE.staging.push({_id:'x'+Date.now(),_source:'ai',_errors:{},_valid:false,_checked:false,
    invoiceNo:d.invoiceNo,project:d.project,lineItem:d.lineItem,lineItemRef:d.lineItemRef||'',

    paymentDate:'',paymentRef:'',description:d.description||''
  });
  LAST_EXTRACTED=null;
  updateStagingBadge();
  navigate('staging');
}

function niSelLI(){
  var p = document.getElementById('ni-proj').value;

  var ref = liEl.value;
  var b = STATE.budget.find(function(x){return x.ref===ref && x.project===p;});
  if(!b) return;
  // Auto-fill vendor if empty
  var vEl = document.getElementById('ni-vendor');
  if(!vEl.value && b.vendor){
    // Try exact match in vendor list
    for(var i=0;i<vEl.options.length;i++){

function niCalcDueDate(){
  var idate = document.getElementById('ni-idate').value;
  var terms = document.getElementById('ni-terms').value;
  if(!idate) return;
  var d = new Date(idate);
  var days = 0;
  if(terms.indexOf('30')>-1) days=30;
  else if(terms.indexOf('45')>-1) days=45;
  else if(terms.indexOf('60')>-1) days=60;
  else if(terms.indexOf('90')>-1) days=90;
  if(days > 0){
    d.setDate(d.getDate()+days);
    var dd = document.getElementById('ni-ddate');
    if(dd) dd.value = d.toISOString().split('T')[0];
  }
  niDeriveStatus();
}

function niDeriveStatus(){
  var ddEl = document.getElementById('ni-ddate');
  var stEl = document.getElementById('ni-status');
  var pdEl = document.getElementById('ni-pdate');
  var amtEl = document.getElementById('ni-amt');
  var pamtEl = document.getElementById('ni-pamt');
  if(!ddEl || !stEl) return;
  var dueDate = ddEl.value;
  var payDate = pdEl ? pdEl.value : '';
  var amt = parseFloat(amtEl ? amtEl.value : 0)||0;
  var pamt = parseFloat(pamtEl ? pamtEl.value : 0)||0;
  var today = new Date().toISOString().split('T')[0];
  var status = 'Pending';
  if(payDate && pamt >= amt && amt > 0) status = 'Paid';
  else if(payDate && pamt > 0 && pamt < amt) status = 'Partial';
  else if(dueDate && dueDate < today) status = 'Overdue';
  for(var i=0;i<stEl.options.length;i++){
    if(stEl.options[i].value===status){stEl.selectedIndex=i;break;}
  }
  // Colour the status field
  var colors = {Paid:'#D1FAE5',Overdue:'#FEE2E2',Partial:'#EDE9FE',Pending:'#F3F4F6'};
  var txtColors = {Paid:'#065F46',Overdue:'#991B1B',Partial:'#5B21B6',Pending:'#374151'};
  stEl.style.background = colors[status]||'#F3F4F6';
  stEl.style.color = txtColors[status]||'#374151';
  stEl.style.fontWeight = '600';
}

function saveInvoiceModal(){
  var num   = (document.getElementById('ni-num').value||'').trim();
  var vendor= document.getElementById('ni-vendor').value;
  var proj  = document.getElementById('ni-proj').value;
  var liRef = document.getElementById('ni-li').value;
  var liName= liRef ? (document.getElementById('ni-li').options[document.getElementById('ni-li').selectedIndex].getAttribute('data-name')||'') : '';
  var amt   = parseFloat(document.getElementById('ni-amt').value)||0;
  var pamt  = parseFloat(document.getElementById('ni-pamt').value)||0;
  var idate = document.getElementById('ni-idate').value;
  var ddate = document.getElementById('ni-ddate').value;
  var terms = document.getElementById('ni-terms').value;
  var pdate = document.getElementById('ni-pdate').value;
  var pref  = (document.getElementById('ni-pref').value||'').trim();
  var status= document.getElementById('ni-status').value;
  var cbp   = document.getElementById('ni-cbp').value === 'true';
  var ccy   = document.getElementById('ni-ccy').value;
  var desc  = document.getElementById('ni-desc').value.trim();
  var errEl = document.getElementById('ni-err');

  if(!num){errEl.textContent='Invoice Number is required.';errEl.style.display='block';return;}
  if(!vendor){errEl.textContent='Vendor is required.';errEl.style.display='block';return;}
  if(!proj){errEl.textContent='Project is required.';errEl.style.display='block';return;}
  if(!liRef){errEl.textContent='Line Item is required.';errEl.style.display='block';return;}
  if(!amt){errEl.textContent='Invoice Amount is required.';errEl.style.display='block';return;}
  if(!idate){errEl.textContent='Invoice Date is required.';errEl.style.display='block';return;}
  if(!ddate){errEl.textContent='Due Date is required.';errEl.style.display='block';return;}

  // Duplicate check
  if(STATE.invoices.find(function(i){return i.invoiceNo===num;})){
    errEl.textContent='Invoice #'+num+' already exists.';errEl.style.display='block';return;
  }

  var payments = [];
  if(pamt > 0 && pdate && pref){
    payments = [{id:genId(),amount:pamt,date:pdate,ref:pref,note:''}];
  } else if(pamt > 0 && pdate){
    payments = [{id:genId(),amount:pamt,date:pdate,ref:'On receipt',note:''}];
  }

  // Find LI type from budget
  var bl = STATE.budget.find(function(b){return b.ref===liRef;});

  var newInv = {
    id:          genId(),
    invoiceNo:   num,
    project:     proj,
    lineItem:    liName,
    lineItemRef: liRef,
    vendor:      vendor,
    type:        bl ? bl.type : 'CAPEX',
    invoiceAmt:  amt,
    invoiceDate: idate,
    dueDate:     ddate,
    paymentTerms:terms,
    payments:    payments,
    status:      status,
    currency:    ccy,
    description: desc,
    canBePaid:   cbp,
  };

  STATE.invoices = STATE.invoices.concat([newInv]);
  persist();
  var dbPmts = payments.map(function(p){return{id:p.id,invoice_id:newInv.id,amount:p.amount,date:p.date||null,ref:p.ref||'',note:p.note||''};});
  sbSync(newInv,null,dbPmts,null);
  closeModal();
  render();
}

function migratePaymentData(invoices){
  return invoices.map(function(inv){

    var hasPayments = (inv.payments||[]).length > 0;
    if(hasPayments) return inv;  // already has payment data, preserve
    if(!pd.ref && !pd.date) return inv;  // no real payment data
    // Add payment record
    var pmt = {id:'pmig_'+inv.id, amount:pd.amt, date:pd.date, ref:pd.ref, note:'Migrated from Excel'};
    return Object.assign({}, inv, {payments:[pmt]});
  });
}

function migratePaymentTerms(invoices){
  return invoices.map(function(inv){
    // Already has valid terms - keep it
    if(inv.paymentTerms && inv.paymentTerms.length > 0) return inv;
    // Try lookup by invoice number first
    var pt = PT_LOOKUP[inv.invoiceNo];
    if(pt) return Object.assign({},inv,{paymentTerms:pt});
    // Compute from date diff
    if(inv.invoiceDate && inv.dueDate){
      var diff = Math.round((new Date(inv.dueDate)-new Date(inv.invoiceDate))/(1000*60*60*24));
      var computed = DAYS_PT[diff];
      if(computed) return Object.assign({},inv,{paymentTerms:computed});
    }
    // Oracle Health always Net 60 Days
    if(inv.project==='Oracle Health' || inv.vendor==='Oracle Health'){
      return Object.assign({},inv,{paymentTerms:'Net 60 Days'});
    }
    return inv; // no match - leave blank
  });
}

function migrateBudget(stored) {
  // Budget lines always from SEED (source of truth — Supabase or SEED_BUDGET)
  if(!stored || !stored.length) return SEED_BUDGET.slice();
  var seedMap = {};
  SEED_BUDGET.forEach(function(s){ seedMap[s.ref] = s; });
  return stored.map(function(b){
    var seed = seedMap[b.ref];
    if(!seed) return b;
    ['name','total','type','vendor','freq','recurStart','recurEnd','payMonth',
     'liTotalCost','paySchedule','projStatus','projStart','projEnd','projDuration','projDesc','projCost','desc']
    .forEach(function(k){ if(seed[k]!==undefined) b[k]=seed[k]; });
    return b;
  });
}

async function loadFromStorage() {
  function applyAll(arr){
    return migrateCanBePaid(migratePaymentData(migratePaymentTerms(
      arr.map(function(i){return Object.assign({payments:[]},i);})
    )));
  }
  var fromSupa = false;
  // Skip Supabase when running as file:// (CORS blocks it) or on localhost
  var canUseSupa = (typeof window !== 'undefined'
    && window.location && window.location.protocol !== 'file:');

  try{
    if(!canUseSupa) throw new Error('Supabase skipped (file:// protocol) — using localStorage');
    // Load projects from Supabase — single source of truth
    var projRows = await _sbGet('projects', 'select=*');
    STATE.projects = projRows.length ? projRows.map(dbToProj) : SEED_PROJECTS.slice();

    // Load budget lines
    var budRows = await _sbGet('budget_lines', 'select=*');
    STATE.budget = budRows.length ? budRows.map(dbToBud) : migrateBudget(SEED_BUDGET.slice());

    // Load invoices
    var invRows = await _sbGet('invoices', 'select=*');

    // Load payments separately and attach
    var pmtRows = await _sbGet('payments', 'select=*');
    var pmtMap  = {};
    pmtRows.forEach(function(p){
      if(!pmtMap[p.invoice_id]) pmtMap[p.invoice_id]=[];
      pmtMap[p.invoice_id].push(p);
    });
    invRows.forEach(function(r){ r.zb_payments = pmtMap[r.id]||[]; });

    // Dedup by invoiceNo+lineItemRef
    var seen = {};
    var rows = invRows.filter(function(r){
      var k = r.invoice_no+'|'+(r.line_item_ref||'');
      if(seen[k]) return false; seen[k]=true; return true;
    });
    STATE.invoices = applyAll(rows.map(dbToInv));

    // Load pay runs
    try {
      var prRows = await _sbGet('pay_runs', 'select=*&order=created_at.desc');
      STATE.payRuns = prRows.map(function(r){
        var items = [];
        try {
          // Supabase jsonb columns come back already parsed as objects — no need for JSON.parse
          if(Array.isArray(r.items)){
            items = r.items;
          } else if(typeof r.items === 'string'){
            items = JSON.parse(r.items||'[]');
          }
        } catch(e){ items = []; }
        return {id:r.id, name:r.name, monthKey:r.month_key, plannedDate:r.planned_date||'', createdAt:r.created_at||'', status:r.status||'Planned', totalPlanned:parseFloat(r.total_planned)||0, items:items};
      });
    } catch(e){ STATE.payRuns = STATE.payRuns||[]; }

    STATE.dataSource = 'supabase';
    fromSupa = true;
    
  } catch(e){
    // silent fallback — localStorage or SEED will be used
    fromSupa = false;
  }

  if(!fromSupa){
    try{
      var ld = localStorage.getItem(STORAGE_KEY+'-delta');
      var lc = localStorage.getItem(STORAGE_KEY+'-cfg');
      if(ld){
        var d=JSON.parse(ld), ds={}, mm={};
        (d.deleted||[]).forEach(function(id){ds[id]=true;});
        (d.modified||[]).forEach(function(x){mm[x.id]=x;});
        var base = SEED_INVOICES.filter(function(s){return !ds[s.id];})
          .map(function(i){return mm[i.id]?Object.assign({},i,mm[i.id]):i;});
        (d.added||[]).forEach(function(i){base.push(i);});
        STATE.invoices = applyAll(base);
      } else {
        STATE.invoices = applyAll(SEED_INVOICES);
      }
      if(lc){
        var cfg=JSON.parse(lc);
        STATE.cfBudget=cfg.cfBudget||{};
        STATE.projects=cfg.projects||SEED_PROJECTS;
        STATE.payRuns=cfg.payRuns||[];
      }
    } catch(e){
      STATE.invoices = applyAll(SEED_INVOICES);
    }
    STATE.budget = migrateBudget(SEED_BUDGET.slice());
    STATE.dataSource = 'local';
  }

  // Dedup safety net
  var seen2={};
  STATE.invoices = STATE.invoices.filter(function(i){
    var k=i.invoiceNo+'|'+(i.lineItemRef||'');
    if(seen2[k]) return false; seen2[k]=true; return true;
  });
  if(!STATE.projects||!STATE.projects.length) STATE.projects = SEED_PROJECTS;
  if(!STATE.budget||!STATE.budget.length) STATE.budget = migrateBudget(SEED_BUDGET.slice());
  if(!STATE.payRuns) STATE.payRuns = [];
}


// ── Export for Claude ─────────────────────────────────────────────────────
function exportForClaude(){
  var now = new Date();
  var ts  = now.toISOString().slice(0,16).replace('T',' ');
  var inv  = STATE.invoices;
  var bud  = STATE.budget;
  var proj = STATE.projects;
  var runs = STATE.payRuns || [];
  var cfb  = STATE.cfBudget || {};

  // ── KPIs ─────────────────────────────────────────────────────
  var totalBudget      = bud.reduce(function(a,b){return a+fullTermTotal(b);},0);
  var totalInvoiced    = inv.reduce(function(a,i){return a+(i.invoiceAmt||0);},0);
  var totalPaidAmt     = inv.reduce(function(a,i){return a+totalPaid(i);},0);
  var totalOutstanding = inv.reduce(function(a,i){return a+outstanding(i);},0);
  var overdueInvs      = inv.filter(function(i){var s=deriveStatus(i);return s==='Overdue'||s==='Partial';});
  var overdueCount     = overdueInvs.length;
  var overdueAmt       = overdueInvs.reduce(function(a,i){return a+outstanding(i);},0);
  var canPayCount      = inv.filter(function(i){return i.canBePaid&&outstanding(i)>0;}).length;
  var canPayAmt        = inv.filter(function(i){return i.canBePaid&&outstanding(i)>0;}).reduce(function(a,i){return a+outstanding(i);},0);

  // Pay run KPIs
  var plannedRuns    = runs.filter(function(r){return r.status==='Planned';});
  var completedRuns  = runs.filter(function(r){return r.status==='Completed';});
  var totalPlannedAmt= plannedRuns.reduce(function(a,r){return a+r.totalPlanned;},0);
  var totalPaidOutRuns = runs.reduce(function(a,r){return a+r.items.reduce(function(b,it){return b+(it.paidAmt||0);},0);},0);

  // ── Per-project summary ───────────────────────────────────────
  var projectSummary = {};
  proj.forEach(function(p){
    var pInv = inv.filter(function(i){return i.project===p.name;});
    var pBud = bud.filter(function(b){return b.project===p.name;});
    projectSummary[p.name] = {
      budget:       pBud.reduce(function(a,b){return a+fullTermTotal(b);},0),
      invoiced:     pInv.reduce(function(a,i){return a+(i.invoiceAmt||0);},0),
      paid:         pInv.reduce(function(a,i){return a+totalPaid(i);},0),
      outstanding:  pInv.reduce(function(a,i){return a+outstanding(i);},0),
      overdue:      pInv.filter(function(i){var s=deriveStatus(i);return s==='Overdue'||s==='Partial';}).reduce(function(a,i){return a+outstanding(i);},0),
      invoiceCount: pInv.length,
      canPayCount:  pInv.filter(function(i){return i.canBePaid&&outstanding(i)>0;}).length
    };
  });

  // ── Full invoice list ─────────────────────────────────────────
  var invoices = inv.map(function(i){
    return {
      id:           i.id,
      invoiceNo:    i.invoiceNo,
      project:      i.project,
      lineItem:     i.lineItem,
      lineItemRef:  i.lineItemRef,
      vendor:       i.vendor,
      type:         i.type,
      invoiceAmt:   i.invoiceAmt,
      invoiceDate:  i.invoiceDate,
      dueDate:      i.dueDate,
      paymentTerms: i.paymentTerms,
      status:       deriveStatus(i),
      currency:     i.currency||'AED',
      description:  i.description,
      canBePaid:    i.canBePaid||false,
      totalPaid:    totalPaid(i),
      outstanding:  outstanding(i),
      daysOverdue:  (i.dueDate&&i.dueDate<now.toISOString().slice(0,10)&&outstanding(i)>0)?Math.floor((now-new Date(i.dueDate))/86400000):0,
      payments:     (i.payments||[]).map(function(p){
        return {id:p.id,amount:p.amount,date:p.date,ref:p.ref,note:p.note||''};
      })
    };
  });

  // ── Pay runs ─────────────────────────────────────────────────
  var payRuns = runs.map(function(r){
    var paidItems    = r.items.filter(function(it){return it.status==='Paid';});
    var pendingItems = r.items.filter(function(it){return it.status==='Planned';});
    return {
      id:           r.id,
      name:         r.name,
      monthKey:     r.monthKey,
      plannedDate:  r.plannedDate||'',
      createdAt:    r.createdAt,
      status:       r.status,
      totalPlanned: r.totalPlanned,
      totalPaid:    paidItems.reduce(function(a,it){return a+(it.paidAmt||0);},0),
      totalPending: pendingItems.reduce(function(a,it){return a+it.plannedAmt;},0),
      invoiceCount: r.items.length,
      paidCount:    paidItems.length,
      pendingCount: pendingItems.length,
      items:        r.items
    };
  });

  // ── Cash flow budgets ─────────────────────────────────────────
  var cashFlowBudgets = Object.keys(cfb).map(function(mk){
    return {monthKey:mk, budget:cfb[mk]};
  }).sort(function(a,b){return a.monthKey.localeCompare(b.monthKey);});

  // ── Budget lines (enriched) ───────────────────────────────────
  var budgetLines = bud.map(function(b){
    var bInv = inv.filter(function(i){return i.lineItemRef===b.ref;});
    return {
      ref:        b.ref,
      project:    b.project,
      name:       b.name,
      type:       b.type,
      vendor:     b.vendor,
      freq:       b.freq,
      total:      b.total,
      totalCost:  fullTermTotal(b),
      desc:       b.desc,
      payMonth:   b.payMonth,
      recurStart: b.recurStart,
      recurEnd:   b.recurEnd,
      invoiced:   bInv.reduce(function(a,i){return a+(i.invoiceAmt||0);},0),
      paid:       bInv.reduce(function(a,i){return a+totalPaid(i);},0),
      outstanding:bInv.reduce(function(a,i){return a+outstanding(i);},0),
      invoiceCount:bInv.length
    };
  });

  var snapshot = {
    _meta: {
      exportedAt:       ts,
      exportedFrom:     (typeof window!=='undefined'&&window.location)?window.location.href:'local',
      appVersion:       VERSION,
      invoiceCount:     inv.length,
      budgetLineCount:  bud.length,
      projectCount:     proj.length,
      payRunCount:      runs.length,
      dataSource:       STATE.dataSource||'unknown'
    },
    kpis: {
      totalBudget:        Math.round(totalBudget*100)/100,
      totalInvoiced:      Math.round(totalInvoiced*100)/100,
      totalPaid:          Math.round(totalPaidAmt*100)/100,
      totalOutstanding:   Math.round(totalOutstanding*100)/100,
      overdueCount:       overdueCount,
      overdueAmount:      Math.round(overdueAmt*100)/100,
      canPayCount:        canPayCount,
      canPayAmount:       Math.round(canPayAmt*100)/100,
      budgetUtilisation:  totalBudget>0?Math.round(totalInvoiced/totalBudget*1000)/10:0,
      paymentRate:        totalInvoiced>0?Math.round(totalPaidAmt/totalInvoiced*1000)/10:0
    },
    payRunKpis: {
      totalRuns:       runs.length,
      plannedRuns:     plannedRuns.length,
      completedRuns:   completedRuns.length,
      totalPlannedAmt: Math.round(totalPlannedAmt*100)/100,
      totalPaidOutRuns:Math.round(totalPaidOutRuns*100)/100
    },
    projectSummary:  projectSummary,
    projects:        proj,
    budgetLines:     budgetLines,
    invoices:        invoices,
    payRuns:         payRuns,
    cashFlowBudgets: cashFlowBudgets
  };

  var json  = JSON.stringify(snapshot, null, 2);
  var blob  = new Blob([json], {type:'application/json'});
  var url   = URL.createObjectURL(blob);
  var a     = document.createElement('a');
  var fname = 'zense_snapshot_'+now.getFullYear()+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0')+'.json';
  a.href=url; a.download=fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Confirmation modal
  document.getElementById('modal-root').innerHTML =
    '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
    +'<div class="modal" style="max-width:500px">'
    +'<div class="modal-title">📤 Exported for Claude</div>'
    +'<div style="background:#F0FDF4;border:1px solid #6EE7B7;border-radius:8px;padding:14px 16px;margin-bottom:14px">'
    +'<div style="font-weight:700;font-size:13px;color:#065F46;margin-bottom:10px">✓ '+fname+' downloaded</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;color:#374151">'
    +'<div>📄 <strong>'+inv.length+'</strong> invoices</div>'
    +'<div>📋 <strong>'+bud.length+'</strong> budget lines</div>'
    +'<div>🏗 <strong>'+proj.length+'</strong> projects</div>'
    +'<div>💳 <strong>'+runs.length+'</strong> payment runs</div>'
    +'<div>📅 <strong>'+Object.keys(cfb).length+'</strong> monthly CF budgets</div>'
    +'<div>💰 <strong>AED '+fmtN(overdueAmt)+'</strong> overdue</div>'
    +'<div>✅ <strong>'+canPayCount+'</strong> approved to pay</div>'
    +'<div>⏳ <strong>'+plannedRuns.length+'</strong> pending pay runs</div>'
    +'</div></div>'
    +'<div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:12px 14px;margin-bottom:14px">'
    +'<div style="font-weight:600;font-size:11px;color:#1E40AF;margin-bottom:6px">How to use in Claude chat:</div>'
    +'<ol style="margin:0;padding-left:18px;font-size:11px;color:#374151;line-height:1.8">'
    +'<li>Drag &amp; drop the JSON file into this Claude chat</li>'
    +'<li>Ask anything — "show overdue invoices", "what\'s pending in pay runs", "summarise Mar 2026 cashflow"</li>'
    +'</ol></div>'
    +'<div style="display:flex;justify-content:flex-end">'
    +'<button class="btn btn-primary" onclick="closeModal()">Got it</button>'
    +'</div></div></div>';
}

// ── Import Snapshot ───────────────────────────────────────────────────────
function importSnapshot(){
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var snap = JSON.parse(ev.target.result);
        // Support both old format (snap.budget) and new format (snap.budgetLines)
        var budLines = snap.budgetLines || snap.budget || [];
        if(!snap.invoices||!snap.projects){
          alert('Invalid snapshot file — missing invoices or projects.');
          return;
        }
        var meta = snap._meta||{};
        var kpis = snap.kpis||{};
        var runs = snap.payRuns||[];
        document.getElementById('modal-root').innerHTML =
          '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">'
          +'<div class="modal" style="max-width:520px">'
          +'<div class="modal-title">📥 Import Snapshot</div>'
          +'<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:12px 14px;margin-bottom:14px">'
          +'<div style="font-weight:700;font-size:12px;color:#92400E;margin-bottom:4px">⚠ This will replace all local data</div>'
          +'<div style="font-size:11px;color:#78350F">Supabase remains unchanged. This only updates what your browser displays until next Supabase load.</div>'
          +'</div>'
          +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">'
          +'<div style="background:#F9FAFB;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Exported At</div><div style="font-weight:600;font-size:11px">'+(meta.exportedAt||'Unknown')+'</div></div>'
          +'<div style="background:#F9FAFB;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Version</div><div style="font-weight:600;font-size:11px">'+(meta.appVersion||'Unknown')+'</div></div>'
          +'<div style="background:#F9FAFB;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Source</div><div style="font-weight:600;font-size:11px">'+(meta.dataSource||'Unknown')+'</div></div>'
          +'<div style="background:#EFF6FF;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Projects</div><div style="font-weight:700;font-size:16px;color:#1B2A4A">'+snap.projects.length+'</div></div>'
          +'<div style="background:#EFF6FF;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Invoices</div><div style="font-weight:700;font-size:16px;color:#1B2A4A">'+snap.invoices.length+'</div></div>'
          +'<div style="background:#EFF6FF;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Budget Lines</div><div style="font-weight:700;font-size:16px;color:#1B2A4A">'+budLines.length+'</div></div>'
          +'<div style="background:#F0FDF4;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Total Invoiced</div><div style="font-weight:700;font-size:13px;color:#059669">AED '+(kpis.totalInvoiced||0).toLocaleString('en-AE',{minimumFractionDigits:2})+'</div></div>'
          +'<div style="background:#FFF5F5;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Overdue</div><div style="font-weight:700;font-size:13px;color:#DC2626">AED '+(kpis.overdueAmount||0).toLocaleString('en-AE',{minimumFractionDigits:2})+'</div></div>'
          +'<div style="background:#F5F3FF;border-radius:6px;padding:10px 12px"><div style="font-size:10px;color:#6b7280;margin-bottom:2px">Pay Runs</div><div style="font-weight:700;font-size:16px;color:#7C3AED">'+runs.length+'</div></div>'
          +'</div>'
          +'<div style="display:flex;gap:8px;justify-content:flex-end">'
          +'<button class="btn btn-outline" onclick="closeModal()">Cancel</button>'
          +'<button class="btn btn-primary" id="snap-confirm-btn">Load Snapshot</button>'
          +'</div></div></div>';
        window._pendingSnap = snap;
        document.getElementById('snap-confirm-btn').onclick = function(){ confirmImportSnapshot(window._pendingSnap); };
      } catch(err){
        alert('Could not parse snapshot: '+err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function confirmImportSnapshot(snap){
  if(typeof snap === 'string') snap = JSON.parse(snap);

  // Support both old format (snap.budget) and new format (snap.budgetLines)
  var budLines = snap.budgetLines || snap.budget || [];

  // Map budgetLines back to internal budget format if needed
  var budget = budLines.map(function(b){
    return {
      ref:        b.ref,
      project:    b.project,
      name:       b.name,
      type:       b.type,
      vendor:     b.vendor||'',
      freq:       b.freq||'one-time',
      total:      b.total||0,
      liTotalCost:b.totalCost||b.liTotalCost||b.total||0,
      desc:       b.desc||'',
      payMonth:   b.payMonth||'',
      recurStart: b.recurStart||'',
      recurEnd:   b.recurEnd||'',
      projStatus: b.projStatus||'Active',
      projStart:  b.projStart||'',
      projEnd:    b.projEnd||'',
      projDuration:b.projDuration||'',
      projDesc:   b.projDesc||'',
      projCost:   b.projCost||0
    };
  });

  // Load all objects
  STATE.invoices  = snap.invoices.map(function(i){ return Object.assign({payments:[]}, i); });
  STATE.budget    = budget;
  STATE.projects  = snap.projects;
  STATE.payRuns   = snap.payRuns || STATE.payRuns || [];

  // Load cash flow budgets
  if(snap.cashFlowBudgets && snap.cashFlowBudgets.length){
    STATE.cfBudget = {};
    snap.cashFlowBudgets.forEach(function(c){ STATE.cfBudget[c.monthKey] = c.budget; });
  }

  persist();
  closeModal();
  render();

  var f = document.getElementById('saved-flash');
  if(f){
    f.textContent = '✓ Snapshot loaded — '+snap.projects.length+' projects, '+snap.invoices.length+' invoices, '+budget.length+' budget lines';
    f.style.display='inline'; f.style.color='#7C3AED';
    clearTimeout(f._t); f._t=setTimeout(function(){f.style.display='none';f.style.color='#10B981';},4000);
  }
}

    +'<a href="#" onclick="showLoginScreen(event)" style="font-size:11px;color:#1B2A4A;opacity:0.6;text-decoration:none" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">← Back to Sign In</a>'
    +'</div>'
    +'</div></div>';
  setTimeout(function(){ var el=document.getElementById('reset-email'); if(el) el.focus(); }, 50);
}

async function doSendReset(){
  var email = (document.getElementById('reset-email')||{}).value||'';
  var errEl = document.getElementById('reset-err');
  var btn   = document.getElementById('reset-btn');
  if(!email){ if(errEl) errEl.textContent='Enter your email address.'; return; }
  if(errEl) errEl.textContent='';
  if(btn){ btn.disabled=true; btn.textContent='Sending...'; }
  try {
    // redirectTo must point to your Netlify app so Supabase sends the right link
    var redirectTo = window.location.origin + window.location.pathname;
    var r = await fetch(SUPA_URL+'/auth/v1/recover',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
      body:JSON.stringify({email:email, options:{redirectTo:redirectTo}})
    });
    // Supabase returns 200 even if email not found (security best practice)
    document.getElementById('app').innerHTML =
      '<div class="login-wrap">'
      +'<div class="login-card">'
      +'<div class="login-logo">🏥 Zense Billing</div>'
      +'<div style="background:#F0FDF4;border:1px solid #6EE7B7;border-radius:8px;padding:18px;text-align:center;margin-bottom:20px">'
      +'<div style="font-size:28px;margin-bottom:8px">📧</div>'
      +'<div style="font-weight:700;font-size:14px;color:#065F46;margin-bottom:6px">Check your email</div>'
      +'<div style="font-size:11px;color:#374151">If an account exists for <strong>'+email+'</strong>,<br>a password reset link has been sent.</div>'
      +'</div>'
      +'<a href="#" onclick="showLoginScreen(event)" style="display:block;text-align:center;font-size:12px;color:#1B2A4A;text-decoration:none;font-weight:600">← Back to Sign In</a>'
      +'</div></div>';
  } catch(err){
    if(errEl) errEl.textContent = err.message||'Could not send reset email. Try again.';
    if(btn){ btn.disabled=false; btn.textContent='Send Reset Link'; }
  }
}

function showSetNewPassword(accessToken){
  // Called when the app detects a recovery token in the URL hash
  document.getElementById('main-nav').style.display = 'none';
  document.getElementById('app').innerHTML =
    '<div class="login-wrap">'
    +'<div class="login-card">'
    +'<div class="login-logo">🏥 Zense Billing</div>'
    +'<div class="login-sub">Set a new password</div>'
    +'<div style="margin-bottom:14px">'
    +'<label class="login-label">New Password</label>'
    +'<input class="login-input" type="password" id="newpass1" placeholder="Min 6 characters" autocomplete="new-password">'
    +'</div>'
    +'<div style="margin-bottom:6px">'
    +'<label class="login-label">Confirm New Password</label>'
    +'<input class="login-input" type="password" id="newpass2" placeholder="Repeat password" autocomplete="new-password" onkeydown="if(event.key===&quot;Enter&quot;)doSetNewPassword()">'
    +'</div>'
    +'<div class="login-err" id="newpass-err"></div>'
    +'<button class="login-btn" id="newpass-btn" onclick="doSetNewPassword()">Set New Password</button>'
    +'</div></div>';
  // Store recovery token temporarily so doSetNewPassword can use it
  window._recoveryToken = accessToken;
  setTimeout(function(){ var el=document.getElementById('newpass1'); if(el) el.focus(); }, 50);
}

async function doSetNewPassword(){
  var p1    = (document.getElementById('newpass1')||{}).value||'';
  var p2    = (document.getElementById('newpass2')||{}).value||'';
  var errEl = document.getElementById('newpass-err');
  var btn   = document.getElementById('newpass-btn');
  if(p1.length < 6){ if(errEl) errEl.textContent='Password must be at least 6 characters.'; return; }
  if(p1 !== p2){     if(errEl) errEl.textContent='Passwords do not match.'; return; }
  if(errEl) errEl.textContent='';
  if(btn){ btn.disabled=true; btn.textContent='Updating...'; }
  try {
    var r = await fetch(SUPA_URL+'/auth/v1/user',{
      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'apikey': SUPA_KEY,
        'Authorization':'Bearer '+(window._recoveryToken||'')
      },
      body:JSON.stringify({password:p1})
    });
    var d = await r.json();
    if(r.ok){
      // Save session from recovery token so user is immediately logged in
      if(d.access_token) _saveAuthSession(d);
      // Clear recovery token from URL without reload
      if(window.history && window.history.replaceState){
        window.history.replaceState(null,'',window.location.pathname);
      }
      window._recoveryToken = null;
      // Show success then load app
      document.getElementById('app').innerHTML =
        '<div class="login-wrap"><div class="login-card">'
        +'<div style="text-align:center;padding:20px 0">'
        +'<div style="font-size:36px;margin-bottom:12px">✅</div>'
        +'<div style="font-weight:700;font-size:15px;color:#065F46;margin-bottom:6px">Password updated!</div>'
        +'<div style="font-size:12px;color:#6b7280">Signing you in...</div>'
        +'</div></div></div>';
      setTimeout(function(){ bootApp(); }, 1200);
    } else {
      throw new Error(d.msg || d.error_description || 'Could not update password.');
    }
  } catch(err){
    if(errEl) errEl.textContent = err.message;
    if(btn){ btn.disabled=false; btn.textContent='Set New Password'; }
  }
}

async function doLogin(){
  var email = (document.getElementById('login-email')||{}).value||'';
  var pass  = (document.getElementById('login-pass')||{}).value||'';
  var errEl = document.getElementById('login-err');
  var btn   = document.getElementById('login-btn');
  if(!email||!pass){ if(errEl) errEl.textContent='Enter your email and password.'; return; }
  if(errEl) errEl.textContent='';
  if(btn){ btn.disabled=true; btn.textContent='Signing in...'; }
  try {
    await authSignIn(email, pass);
    // Success — boot the app
    await bootApp();
  } catch(e) {
    if(errEl) errEl.textContent = e.message||'Login failed. Check your credentials.';
    if(btn){ btn.disabled=false; btn.textContent='Sign In'; }
  }
}

async function doDevMode(e){
  if(e) e.preventDefault();
  // Boot app without Supabase auth — loads seed data (CAPEX/OPEX, all 8 projects)
  // Supabase writes will silently fail (no JWT) — read-only preview only
  AUTH.token = null;
  AUTH.user  = { email: 'dev@preview' };
  STATE.dataSource = 'local';
  document.getElementById('main-nav').style.display = 'flex';
  document.getElementById('app').innerHTML =
    '<div class="loader"><div class="spin"></div><div>Loading seed data (Dev Mode)…</div></div>';
  // Populate state from seed
  STATE.invoices  = migrateCanBePaid(migratePaymentData(migratePaymentTerms(
    SEED_INVOICES.map(function(i){return Object.assign({payments:[]},i);}))));
  STATE.budget    = migrateBudget(SEED_BUDGET.slice());
  STATE.projects  = SEED_PROJECTS.slice();
  if(!STATE.projects||!STATE.projects.length) STATE.projects = SEED_PROJECTS.slice();
  showUserBadge();
  // Override data source chip to show DEV badge
  var chip = document.getElementById('data-src-chip');
  if(chip){ chip.className='src-chip-local'; chip.textContent='🛠 Dev Mode'; chip.title='Dev Mode — seed data only, no Supabase auth. Changes will not be saved.'; }
  render();
}

async function initAuth(){
  // file:// — skip auth entirely
  var proto = (typeof window!=='undefined'&&window.location)?window.location.protocol:'';
  if(proto==='file:') return true;

  // Claude chat / iframe preview — fetch live from Supabase using anon key (read-only)
  var isIframe = (typeof window!=='undefined' && window.self !== window.top);
  var isNetlify = (typeof window!=='undefined' && window.location && window.location.hostname.indexOf('netlify') >= 0);
  if(isIframe && !isNetlify){
    // Claude's iframe sandbox blocks cross-origin fetch — Supabase unreachable from here.
    // Boot instantly with seed data. Use Export for Claude on Netlify for live data analysis.
    document.getElementById('main-nav').style.display = 'flex';
    AUTH.user = { email: '👁 Preview' };
    STATE.invoices  = migrateCanBePaid(migratePaymentData(migratePaymentTerms(
      SEED_INVOICES.map(function(i){return Object.assign({payments:[]},i);}))));
    STATE.budget    = migrateBudget(SEED_BUDGET.slice());
    STATE.projects  = SEED_PROJECTS.slice();
    STATE.dataSource = 'local';
    var lb = document.getElementById('logout-btn'); if(lb) lb.style.display='none';
    showUserBadge();
    var chip = document.getElementById('data-src-chip');
    if(chip){
      chip.className = 'src-chip-local';
      chip.textContent = '🛠 Seed Preview';
      chip.title = 'Claude chat — seed data only. Cross-origin fetch blocked by iframe sandbox.\nFor live data: use Export for Claude on Netlify and upload JSON here.';
    }
    render();
    return false;
  }

  // ── Check for recovery token in URL hash (password reset redirect) ────────
  // Supabase sends: #access_token=xxx&type=recovery
  if(window.location.hash){
    var hashParams = {};
    window.location.hash.slice(1).split('&').forEach(function(part){
      var kv = part.split('=');
      hashParams[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
    });
    if(hashParams.type === 'recovery' && hashParams.access_token){
      // Show the set-new-password screen with the recovery token
      showSetNewPassword(hashParams.access_token);
      return false; // don't boot app yet
    }
    // Regular sign-in via magic link or OAuth — save session
    if(hashParams.access_token && hashParams.type !== 'recovery'){
      _saveAuthSession({
        access_token:  hashParams.access_token,
        refresh_token: hashParams.refresh_token||'',
        expires_in:    parseInt(hashParams.expires_in)||3600,
        user:          AUTH.user
      });
      // Clean URL
      if(window.history && window.history.replaceState){
        window.history.replaceState(null,'',window.location.pathname);
      }
      return true;
    }
  }

  // Try to load existing session from localStorage
  try {
    var s = localStorage.getItem(AUTH_STORAGE_KEY);
    if(s){
      var sess = JSON.parse(s);
      Object.assign(AUTH, sess);
      // Still valid?
      if(AUTH.token && Date.now() < AUTH.expiresAt - 60000) return true;
      // Try token refresh
      if(AUTH.refreshToken){
        var refreshed = await _refreshAuthToken();
        if(refreshed) return true;
      }
    }
  } catch(e){}

  // No valid session — show login
  showLoginScreen();
  return false;
}

function showUserBadge(){
  var badge = document.getElementById('auth-user-badge');
  if(badge && AUTH.user && AUTH.user.email){
    badge.textContent = AUTH.user.email;
    badge.style.display = 'inline';
  }
  // Data source chip — always visible, clearly shows Supabase vs Local
  var chip = document.getElementById('data-src-chip');
  if(chip){
    if(STATE.dataSource === 'supabase'){
      chip.className = 'src-chip-supa';
      chip.textContent = '● Supabase';
      chip.title = 'Live data — loaded from Supabase (projects, invoices, budget, payments)';
    } else if(STATE.dataSource === 'local'){
      chip.className = 'src-chip-local';
      chip.textContent = '● Local';
      chip.title = 'Offline mode — data loaded from localStorage / seed. Supabase unreachable.';
    } else {
      chip.className = '';
      chip.textContent = '';
    }
  }
}

function toggleToolsMenu(e){
  e.stopPropagation();
  document.getElementById('tools-dropdown').classList.toggle('open');
}
function closeToolsMenu(){
  document.getElementById('tools-dropdown').classList.remove('open');
}
document.addEventListener('click',function(e){
  var w=document.getElementById('tools-wrap');
  if(w&&!w.contains(e.target))closeToolsMenu();
});

async function bootApp(){
  document.getElementById('main-nav').style.display = 'flex';
  var proto = (typeof window!=='undefined'&&window.location)?window.location.protocol:'';
  // Hide Import Snapshot on Netlify production — only available in Claude chat preview
  var isIframe = (typeof window!=='undefined' && window.self !== window.top);
  var snapBtn = document.getElementById('import-snap-btn');
  if(snapBtn) snapBtn.style.display = isIframe ? '' : 'none';
  document.getElementById('app').innerHTML='<div class="loader"><div class="spin"></div><div>'
    +(proto==='file:' ? 'Loading from local storage...' : 'Loading from Supabase...')
    +'</div></div>';
  await loadFromStorage();
  showUserBadge();
  render();
}


(async function(){
  var authed = await initAuth();
  if(!authed) return; // login screen is now showing
  await bootApp();
})();
